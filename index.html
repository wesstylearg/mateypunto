<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MATE & PUNTO 🧉 — Gestión de Stock</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  /* Paleta basada en el logo */
  --bg: #1a1612; 
  --surface: #24201b; 
  --surface2: #2e2923;
  --border: #3d352c;
  --primary: #0d3d28; /* Verde del logo */
  --primary-light: #1b5e3d;
  --accent: #d9c5a3; /* Crema/Dorado suave */
  --text: #fdf5e6; /* Crema claro */
  --text-dim: #a89a8e;
  --red: #8b3a3a;
  --green: #42e091;
  --radius: 12px;
  --font-display: 'DM Serif Display', serif;
  --font-mono: 'DM Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font-mono); font-size: 13px; line-height: 1.6; }

/* Header & Estética */
header { 
    padding: 20px; 
    background: var(--primary); 
    border-bottom: 3px solid var(--accent);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
}
.logo-container { display: flex; align-items: center; gap: 12px; }
.logo-text { font-family: var(--font-display); font-size: 24px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }

nav { display: flex; gap: 5px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 10px; }
.nav-btn { 
    background: none; border: none; color: var(--accent); padding: 8px 15px; 
    border-radius: 8px; cursor: pointer; font-family: var(--font-mono); font-size: 12px; transition: 0.2s;
}
.nav-btn.active { background: var(--accent); color: var(--primary); font-weight: bold; }

/* Contenedores */
main { padding: 20px; max-width: 1000px; margin: 0 auto; }
.view { display: none; }
.view.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* Cards Financieras */
.cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
.stat-card { 
    background: var(--surface); border: 1px solid var(--border); 
    padding: 20px; border-radius: var(--radius); border-left: 4px solid var(--accent);
}
.stat-label { color: var(--text-dim); font-size: 11px; text-transform: uppercase; margin-bottom: 8px; }
.stat-value { font-family: var(--font-display); font-size: 28px; color: var(--accent); }

/* Botones */
.btn { 
    background: var(--primary); border: 1px solid var(--accent); color: var(--accent); 
    padding: 10px 20px; border-radius: 8px; cursor: pointer; font-family: var(--font-mono); transition: 0.2s;
}
.btn:hover { background: var(--accent); color: var(--primary); }
.btn.secondary { background: var(--surface2); border-color: var(--border); color: var(--text-dim); }
.btn.danger { background: transparent; border-color: var(--red); color: var(--red); }
.btn.danger:hover { background: var(--red); color: white; }

/* Productos & Listas */
.productos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; }
.producto-card { 
    background: var(--surface); border: 1px solid var(--border); padding: 18px; 
    border-radius: var(--radius); position: relative; transition: 0.2s;
}
.producto-card:hover { border-color: var(--accent); }
.price-tag { color: var(--accent); font-weight: bold; font-size: 16px; margin: 10px 0; }

.historial-card { 
    background: var(--surface); border: 1px solid var(--border); padding: 15px; 
    border-radius: var(--radius); margin-bottom: 10px; 
}

/* Modales */
.modal-overlay { 
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); 
    z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px);
}
.modal-overlay.open { display: flex; }
.modal { 
    background: var(--surface); border: 1px solid var(--accent); padding: 30px; 
    border-radius: 15px; width: 90%; max-width: 500px;
}
input, select { 
    width: 100%; background: var(--bg); border: 1px solid var(--border); 
    color: var(--text); padding: 12px; border-radius: 8px; margin-top: 5px; margin-bottom: 15px;
}
label { color: var(--accent); font-size: 11px; text-transform: uppercase; }

/* Utils */
.badge { padding: 3px 8px; border-radius: 5px; font-size: 10px; text-transform: uppercase; font-weight: bold; }
.badge-stock { background: var(--primary); color: var(--accent); }
.badge-low { background: #5a3d12; color: #ffcc80; }
.badge-out { background: #4a1a1a; color: #ff9999; }
#toast { 
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
    background: var(--accent); color: var(--primary); padding: 10px 25px; 
    border-radius: 30px; font-weight: bold; z-index: 2000; display: none;
}
</style>
</head>
<body>

<header>
    <div class="logo-container">
        <div class="logo-text">Mate & Punto</div>
    </div>
    <div style="display: flex; gap: 15px; align-items: center;">
        <nav>
            <button class="nav-btn active" onclick="showView('dashboard')">Inicio</button>
            <button class="nav-btn" onclick="showView('stock')">Stock</button>
            <button class="nav-btn" onclick="showView('ventas')">Ventas</button>
        </nav>
        <button class="btn secondary" onclick="abrirConfig()" style="padding: 8px;">⚙</button>
    </div>
</header>

<main>
    <div class="view active" id="view-dashboard">
        <div class="cards-grid">
            <div class="stat-card">
                <div class="stat-label">Ventas hoy</div>
                <div class="stat-value" id="stat-ventas-hoy">$0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Ganancia hoy</div>
                <div class="stat-value" id="stat-ganancia-hoy" style="color:var(--green)">$0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Capital en Stock (Costo)</div>
                <div class="stat-value" id="stat-capital-stock">$0</div>
            </div>
        </div>

        <h3 style="color:var(--accent); margin-bottom:15px; font-family:var(--font-display)">Alertas de Stock</h3>
        <div id="dashboard-alertas"></div>
    </div>

    <div class="view" id="view-stock">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
            <h2 style="font-family:var(--font-display); color:var(--accent)">Inventario</h2>
            <button class="btn" onclick="openModalItem()">+ Agregar Producto</button>
        </div>
        <div class="productos-grid" id="stock-grid"></div>
    </div>

    <div class="view" id="view-ventas">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
            <h2 style="font-family:var(--font-display); color:var(--accent)">Historial</h2>
            <button class="btn" onclick="openModalVenta()">+ Nueva Venta</button>
        </div>
        <div id="ventas-lista"></div>
    </div>
</main>

<div class="modal-overlay" id="modal-item">
    <div class="modal">
        <h3 id="modal-item-title" style="color:var(--accent); margin-bottom:20px">Producto</h3>
        <label>Nombre</label>
        <input type="text" id="item-nombre" placeholder="Ej: Mate Imperial">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
            <div>
                <label>Precio Costo ($)</label>
                <input type="number" id="item-costo" placeholder="0">
            </div>
            <div>
                <label>Precio Venta ($)</label>
                <input type="number" id="item-venta" placeholder="0">
            </div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
            <div>
                <label>Stock Inicial</label>
                <input type="number" id="item-cantidad" placeholder="0">
            </div>
            <div>
                <label>Mínimo Alerta</label>
                <input type="number" id="item-minimo" value="3">
            </div>
        </div>
        <div style="display:flex; gap:10px; margin-top:10px">
            <button class="btn secondary" style="flex:1" onclick="closeModal('modal-item')">Cancelar</button>
            <button class="btn" style="flex:1" onclick="guardarItem()">Guardar</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modal-venta">
    <div class="modal">
        <h3 style="color:var(--accent); margin-bottom:20px">Registrar Venta</h3>
        <label>Producto</label>
        <select id="venta-producto-id"></select>
        <label>Cantidad</label>
        <input type="number" id="venta-qty" value="1" min="1">
        <label>Descuento total ($)</label>
        <input type="number" id="venta-descuento" value="0">
        <div style="background:var(--bg); padding:15px; border-radius:8px; margin-bottom:15px">
            <div style="display:flex; justify-content:space-between">
                <span>Total Final:</span>
                <span id="venta-total-preview" style="color:var(--accent); font-weight:bold">$0</span>
            </div>
        </div>
        <div style="display:flex; gap:10px">
            <button class="btn secondary" style="flex:1" onclick="closeModal('modal-venta')">Cerrar</button>
            <button class="btn" style="flex:1" onclick="confirmarVenta()">Confirmar Venta</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modal-config">
    <div class="modal">
        <h3 style="color:var(--accent); margin-bottom:20px">Configuración GitHub</h3>
        <label>Token de Acceso</label>
        <input type="password" id="cfg-token" placeholder="ghp_xxxx">
        <label>Gist ID</label>
        <input type="text" id="cfg-gist" placeholder="ID del Gist">
        <button class="btn" style="width:100%" onclick="guardarConfig()">Conectar Datos</button>
        <p style="font-size:10px; color:var(--text-dim); margin-top:10px">Los datos se sincronizan con tu Gist privado.</p>
    </div>
</div>

<div id="toast"></div>

<script>
// =============================================
// ESTADO Y NUBE
// =============================================
let DB = { items: [], ventas: [] };
const LS_TOKEN = 'mp_token', LS_GIST = 'mp_gist';

async function syncGist(method = 'GET', data = null) {
    const token = localStorage.getItem(LS_TOKEN);
    const gistId = localStorage.getItem(LS_GIST);
    if (!token || !gistId) return null;

    const url = `https://api.github.com/gists/${gistId}`;
    const headers = { 'Authorization': `token ${token}` };
    
    try {
        if (method === 'GET') {
            const res = await fetch(url, { headers });
            const json = await res.json();
            return JSON.parse(json.files['mate.json'].content);
        } else {
            await fetch(url, {
                method: 'PATCH',
                headers,
                body: JSON.stringify({ files: { 'mate.json': { content: JSON.stringify(data) } } })
            });
        }
    } catch (e) { console.error("Error de sincronización", e); }
}

async function updateDB() {
    await syncGist('PATCH', DB);
    renderAll();
}

// =============================================
// LOGICA DE NEGOCIO
// =============================================

function guardarItem() {
    const id = editingId || Date.now().toString();
    const nuevo = {
        id,
        nombre: document.getElementById('item-nombre').value,
        costo: parseFloat(document.getElementById('item-costo').value) || 0,
        venta: parseFloat(document.getElementById('item-venta').value) || 0,
        cantidad: parseInt(document.getElementById('item-cantidad').value) || 0,
        minimo: parseInt(document.getElementById('item-minimo').value) || 3
    };

    const idx = DB.items.findIndex(i => i.id === id);
    if (idx > -1) DB.items[idx] = nuevo;
    else DB.items.push(nuevo);

    closeModal('modal-item');
    updateDB();
    showToast("Producto guardado");
}

function eliminarProducto(id) {
    if (!confirm("¿Eliminar este producto del stock? Esto no borrará el historial de ventas pasadas.")) return;
    DB.items = DB.items.filter(i => i.id !== id);
    updateDB();
    showToast("Producto eliminado del stock");
}

function confirmarVenta() {
    const pId = document.getElementById('venta-producto-id').value;
    const qty = parseInt(document.getElementById('venta-qty').value);
    const desc = parseFloat(document.getElementById('venta-descuento').value) || 0;
    
    const item = DB.items.find(i => i.id === pId);
    if (!item || item.cantidad < qty) return alert("Stock insuficiente");

    // Reducir stock
    item.cantidad -= qty;

    // Registrar venta con "snapshot" de precios para que no cambien en el futuro
    DB.ventas.push({
        id: Date.now().toString(),
        fecha: new Date().toISOString(),
        productoId: pId,
        nombre: item.nombre, // Guardamos el nombre por si se borra el item
        qty,
        precioCostoSnapshot: item.costo,
        precioVentaSnapshot: item.venta,
        descuento: desc,
        total: (item.venta * qty) - desc
    });

    closeModal('modal-venta');
    updateDB();
    showToast("Venta registrada con éxito");
}

// =============================================
// RENDERIZADO
// =============================================

function fmt(n) { return '$' + parseFloat(n).toLocaleString('es-AR'); }

function renderAll() {
    renderDashboard();
    renderStock();
    renderHistorial();
}

function renderDashboard() {
    const hoy = new Date().toDateString();
    const vHoy = DB.ventas.filter(v => new Date(v.fecha).toDateString() === hoy);
    
    const ingresos = vHoy.reduce((acc, v) => acc + v.total, 0);
    const costos = vHoy.reduce((acc, v) => acc + (v.precioCostoSnapshot * v.qty), 0);
    const capital = DB.items.reduce((acc, i) => acc + (i.costo * i.cantidad), 0);

    document.getElementById('stat-ventas-hoy').textContent = fmt(ingresos);
    document.getElementById('stat-ganancia-hoy').textContent = fmt(ingresos - costos);
    document.getElementById('stat-capital-stock').textContent = fmt(capital);

    // Alertas
    const alertas = DB.items.filter(i => i.cantidad <= i.minimo);
    document.getElementById('dashboard-alertas').innerHTML = alertas.map(i => `
        <div style="background:var(--surface2); padding:10px; border-radius:8px; margin-bottom:5px; display:flex; justify-content:space-between; align-items:center">
            <span>${i.nombre}</span>
            <span class="badge ${i.cantidad === 0 ? 'badge-out' : 'badge-low'}">
                ${i.cantidad === 0 ? 'AGOTADO' : 'BAJO: ' + i.cantidad}
            </span>
        </div>
    `).join('') || '<p style="color:var(--text-dim)">Todo el stock está al día.</p>';
}

function renderStock() {
    const container = document.getElementById('stock-grid');
    container.innerHTML = DB.items.map(i => `
        <div class="producto-card">
            <div style="display:flex; justify-content:space-between">
                <span style="font-weight:bold; color:var(--accent)">${i.nombre}</span>
                <span class="badge badge-stock">${i.cantidad} u.</span>
            </div>
            <div class="price-tag">${fmt(i.venta)}</div>
            <div style="font-size:10px; color:var(--text-dim); margin-bottom:15px">Costo: ${fmt(i.costo)}</div>
            <div style="display:flex; gap:5px">
                <button class="btn secondary" style="flex:1; font-size:11px" onclick="editarItem('${i.id}')">Editar</button>
                <button class="btn danger" style="padding:5px 10px" onclick="eliminarProducto('${i.id}')">🗑</button>
            </div>
        </div>
    `).join('');
}

function renderHistorial() {
    const container = document.getElementById('ventas-lista');
    const sorted = [...DB.ventas].reverse();
    container.innerHTML = sorted.map(v => `
        <div class="historial-card">
            <div style="display:flex; justify-content:space-between; align-items:flex-start">
                <div>
                    <div style="font-weight:bold; color:var(--accent)">${v.nombre}</div>
                    <div style="font-size:10px; color:var(--text-dim)">${new Date(v.fecha).toLocaleDateString()} ${new Date(v.fecha).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                </div>
                <div style="text-align:right">
                    <div style="color:var(--green); font-weight:bold">${fmt(v.total)}</div>
                    <div style="font-size:9px; color:var(--text-dim)">Cant: ${v.qty}</div>
                </div>
            </div>
        </div>
    `).join('');
}

// =============================================
// MODALES E INTERFAZ
// =============================================
let editingId = null;

function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('view-' + id).classList.add('active');
    event.target.classList.add('active');
}

function openModalItem() {
    editingId = null;
    document.getElementById('modal-item-title').textContent = "Nuevo Producto";
    document.getElementById('item-nombre').value = "";
    document.getElementById('item-costo').value = "";
    document.getElementById('item-venta').value = "";
    document.getElementById('item-cantidad').value = "";
    document.getElementById('modal-item').classList.add('open');
}

function editarItem(id) {
    const i = DB.items.find(x => x.id === id);
    editingId = id;
    document.getElementById('modal-item-title').textContent = "Editar Producto";
    document.getElementById('item-nombre').value = i.nombre;
    document.getElementById('item-costo').value = i.costo;
    document.getElementById('item-venta').value = i.venta;
    document.getElementById('item-cantidad').value = i.cantidad;
    document.getElementById('modal-item').classList.add('open');
}

function openModalVenta() {
    const sel = document.getElementById('venta-producto-id');
    sel.innerHTML = DB.items.map(i => `<option value="${i.id}">${i.nombre} (Disp: ${i.cantidad})</option>`).join('');
    document.getElementById('modal-venta').classList.add('open');
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function showToast(m) {
    const t = document.getElementById('toast');
    t.textContent = m; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2000);
}

function guardarConfig() {
    localStorage.setItem(LS_TOKEN, document.getElementById('cfg-token').value);
    localStorage.setItem(LS_GIST, document.getElementById('cfg-gist').value);
    location.reload();
}

function abrirConfig() {
    document.getElementById('cfg-token').value = localStorage.getItem(LS_TOKEN) || "";
    document.getElementById('cfg-gist').value = localStorage.getItem(LS_GIST) || "";
    document.getElementById('modal-config').classList.add('open');
}

// Inicialización
(async function init() {
    if (!localStorage.getItem(LS_TOKEN)) {
        abrirConfig();
    } else {
        const cloudData = await syncGist('GET');
        if (cloudData) DB = cloudData;
        renderAll();
    }
})();
</script>

</body>
</html>
