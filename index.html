<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MATE & PUNTO 🧉 — Gestión v4.3 (Fotos Fix)</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #13110f; --surface: #1c1915; --surface2: #26221c; --border: #363028;
            --primary: #0d3d28; --primary-light: #1b5e3d; --accent: #d9c5a3;
            --text: #fdf5e6; --text-dim: #a89a8e; --red: #a33b3b; --green: #42e091;
            --radius: 14px; --font-display: 'DM Serif Display', serif; --font-mono: 'DM Mono', monospace;
        }

        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0; -webkit-tap-highlight-color: transparent;}
        body{background:var(--bg);color:var(--text);font-family:var(--font-mono);font-size:13px;line-height:1.6;overflow-x:hidden}

        header {
            padding: 12px 15px; background: var(--primary); border-bottom: 2px solid var(--accent);
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .logo { font-family: var(--font-display); font-size: 20px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }

        nav { display: flex; width: 100%; gap: 4px; background: rgba(0,0,0,0.3); padding: 4px; border-radius: 10px; overflow-x: auto; scrollbar-width: none; }
        nav::-webkit-scrollbar { display: none; }

        .nav-btn {
            flex: 1; min-width: 85px; background: none; border: none; color: var(--text-dim); padding: 10px 5px;
            border-radius: 8px; cursor: pointer; font-family: var(--font-mono); font-size: 10px;
            transition: 0.3s; white-space: nowrap;
        }
        .nav-btn.active { background: var(--accent); color: var(--primary); font-weight: bold; }

        main { padding: 15px; max-width: 1100px; margin: 0 auto; min-height: 80vh; padding-bottom: 40px; }
        .view { display: none; animation: fadeIn 0.4s ease forwards; }
        .view.active { display: block; }
        @keyframes fadeIn { from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)} }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        @media (max-width: 380px) { .grid { grid-template-columns: 1fr; } }

        .card { 
            background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 15px; position: relative; transition: 0.3s; display: flex; flex-direction: column;
        }

        .prod-img { 
            width: 100%; height: 140px; object-fit: cover; border-radius: 10px; 
            margin-bottom: 12px; background: var(--bg); border: 1px solid var(--border);
        }

        .price { font-family: var(--font-display); font-size: 18px; color: var(--accent); margin: 5px 0; }
        .small-label { font-size: 9px; text-transform: uppercase; color: var(--text-dim); letter-spacing: 1px; }

        .btn {
            background: var(--primary); color: var(--accent); border: 1px solid var(--accent);
            padding: 12px; border-radius: 10px; cursor: pointer; font-family: var(--font-mono);
            font-size: 11px; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%;
        }
        .btn:active { transform: scale(0.98); background: var(--accent); color: var(--primary); }
        .btn.sec { background: var(--surface2); border-color: var(--border); color: var(--text-dim); }
        .btn.danger { border-color: var(--red); color: var(--red); background: transparent; }

        .qty-controls {
            display: flex; align-items: center; justify-content: space-between; gap: 5px;
            background: var(--bg); padding: 8px; border-radius: 10px; margin-top: 10px;
        }
        .btn-qty {
            background: var(--surface2); border: 1px solid var(--border); color: var(--accent);
            width: 35px; height: 35px; border-radius: 8px; cursor: pointer; font-size: 16px;
        }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            display: none; align-items: flex-start; justify-content: center; z-index: 2000;
            backdrop-filter: blur(8px); padding: 15px; padding-top: 30px; overflow-y: auto;
        }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--surface); border: 2px solid var(--accent); padding: 20px; border-radius: 20px; width: 100%; max-width: 450px; position: relative; }

        .close-modal { position: absolute; top: 10px; right: 15px; background: none; border: none; color: var(--text-dim); font-size: 24px; cursor: pointer; }

        label { display: block; font-size: 10px; text-transform: uppercase; color: var(--accent); margin-top: 12px; margin-bottom: 4px; }
        input, select, textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 10px; font-family: var(--font-mono); font-size: 14px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: var(--surface); padding: 12px; border-radius: var(--radius); border-left: 3px solid var(--accent); }

        .hist-item {
            background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
            padding: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
        }

        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--accent); color: var(--primary); padding: 12px 20px; border-radius: 50px; font-weight: bold; z-index: 3000; display: none; width: 80%; text-align: center; }
    </style>
</head>
<body>

<div id="setup-screen" style="position:fixed;inset:0;background:var(--bg);display:none;align-items:center;justify-content:center;z-index:4000;padding:20px;">
    <div class="modal" style="text-align:center">
        <div class="logo" style="font-size:28px; margin-bottom:10px">Mate & Punto</div>
        <p style="color:var(--text-dim); margin-bottom:20px">Ingresa ID de la API</p>
        <input type="text" id="cloud-id" placeholder="ID de npoint...">
        <button class="btn" style="margin-top:15px" onclick="api.manualLogin()">CONECTAR</button>
    </div>
</div>

<header id="app-header" style="display:none">
    <div class="logo">Mate & Punto</div>
    <nav>
        <button class="nav-btn active" onclick="switchView('dashboard', this)">Panel</button>
        <button class="nav-btn" onclick="switchView('stock', this)">Stock</button>
        <button class="nav-btn" onclick="switchView('combos', this)">Combos</button>
        <button class="nav-btn" onclick="switchView('finanzas', this)">Finanzas</button>
        <button class="nav-btn" style="color:var(--red)" onclick="api.logout()">Salir</button>
    </nav>
</header>

<main id="app-main" style="display:none">
    
    <div class="view active" id="view-dashboard">
        <div class="stats-grid">
            <div class="stat-box">
                <div class="small-label">Ganancia Hoy</div>
                <div class="price" id="stat-ganancia-hoy" style="color:var(--green)">$0</div>
            </div>
            <div class="stat-box">
                <div class="small-label">Ganancia Total</div>
                <div class="price" id="stat-ganancia-total" style="color:var(--accent)">$0</div>
            </div>
        </div>
        <div class="stat-box" style="margin-bottom:15px; border-left-color: var(--green);" onclick="api.ajustarCaja()">
            <div class="small-label">Dinero en Caja (Efectivo/Total) ✎</div>
            <div class="price" id="stat-caja-actual" style="color:var(--green)">$0</div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:25px">
            <button class="btn" onclick="openModal('modal-venta')">⚡ VENTA</button>
            <button class="btn sec" onclick="openModal('modal-gasto')">💸 GASTO</button>
        </div>

        <h3 style="font-family:var(--font-display); color:var(--accent); margin-bottom:10px">Alertas Críticas</h3>
        <div id="dashboard-alertas"></div>
    </div>

    <div class="view" id="view-stock">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
            <h2 style="font-family:var(--font-display)">INVENTARIO</h2>
            <button class="btn" style="width:auto; padding:8px 15px" onclick="api.resetItemForm(); openModal('modal-item');">+ NUEVO</button>
        </div>
        <div class="grid" id="stock-grid"></div>
    </div>
