<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MATE & PUNTO 🧉 — Gestión v4.2</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #13110f; --surface: #1c1915; --surface2: #26221c; --border: #363028;
            --primary: #0d3d28; --primary-light: #1b5e3d; --accent: #d9c5a3;
            --text: #fdf5e6; --text-dim: #a89a8e; --red: #a33b3b; --green: #42e091;
            --radius: 14px; --font-display: 'DM Serif Display', serif; --font-mono: 'DM Mono', monospace;
        }

        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0; -webkit-tap-highlight-color: transparent;}
        body{background:var(--bg);color:var(--text);font-family:var(--font-mono);font-size:13px;line-height:1.6;overflow-x:hidden}

        header {
            padding: 12px 15px; background: var(--primary); border-bottom: 2px solid var(--accent);
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .logo { font-family: var(--font-display); font-size: 20px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }

        nav { display: flex; width: 100%; gap: 4px; background: rgba(0,0,0,0.3); padding: 4px; border-radius: 10px; overflow-x: auto; scrollbar-width: none; }
        nav::-webkit-scrollbar { display: none; }

        .nav-btn {
            flex: 1; min-width: 85px; background: none; border: none; color: var(--text-dim); padding: 10px 5px;
            border-radius: 8px; cursor: pointer; font-family: var(--font-mono); font-size: 10px;
            transition: 0.3s; white-space: nowrap;
        }
        .nav-btn.active { background: var(--accent); color: var(--primary); font-weight: bold; }

        main { padding: 15px; max-width: 1100px; margin: 0 auto; min-height: 80vh; padding-bottom: 40px; }
        .view { display: none; animation: fadeIn 0.4s ease forwards; }
        .view.active { display: block; }
        @keyframes fadeIn { from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)} }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        @media (max-width: 380px) { .grid { grid-template-columns: 1fr; } }

        .card { 
            background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 15px; position: relative; transition: 0.3s; display: flex; flex-direction: column;
        }

        .prod-img { 
            width: 100%; height: 140px; object-fit: cover; border-radius: 10px; 
            margin-bottom: 12px; background: var(--bg); border: 1px solid var(--border);
        }

        .price { font-family: var(--font-display); font-size: 18px; color: var(--accent); margin: 5px 0; }
        .small-label { font-size: 9px; text-transform: uppercase; color: var(--text-dim); letter-spacing: 1px; }

        .btn {
            background: var(--primary); color: var(--accent); border: 1px solid var(--accent);
            padding: 12px; border-radius: 10px; cursor: pointer; font-family: var(--font-mono);
            font-size: 11px; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%;
        }
        .btn:active { transform: scale(0.98); background: var(--accent); color: var(--primary); }
        .btn.sec { background: var(--surface2); border-color: var(--border); color: var(--text-dim); }
        .btn.danger { border-color: var(--red); color: var(--red); background: transparent; }

        .qty-controls {
            display: flex; align-items: center; justify-content: space-between; gap: 5px;
            background: var(--bg); padding: 8px; border-radius: 10px; margin-top: 10px;
        }
        .btn-qty {
            background: var(--surface2); border: 1px solid var(--border); color: var(--accent);
            width: 35px; height: 35px; border-radius: 8px; cursor: pointer; font-size: 16px;
        }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            display: none; align-items: flex-start; justify-content: center; z-index: 2000;
            backdrop-filter: blur(8px); padding: 15px; padding-top: 30px; overflow-y: auto;
        }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--surface); border: 2px solid var(--accent); padding: 20px; border-radius: 20px; width: 100%; max-width: 450px; position: relative; }

        .close-modal { position: absolute; top: 10px; right: 15px; background: none; border: none; color: var(--text-dim); font-size: 24px; cursor: pointer; }

        label { display: block; font-size: 10px; text-transform: uppercase; color: var(--accent); margin-top: 12px; margin-bottom: 4px; }
        input, select, textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 10px; font-family: var(--font-mono); font-size: 14px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: var(--surface); padding: 12px; border-radius: var(--radius); border-left: 3px solid var(--accent); }

        .hist-item {
            background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
            padding: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
        }

        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--accent); color: var(--primary); padding: 12px 20px; border-radius: 50px; font-weight: bold; z-index: 3000; display: none; width: 80%; text-align: center; }
    </style>
</head>
<body>

<header id="app-header" style="display:none">
    <div class="logo">Mate & Punto</div>
    <nav>
        <button class="nav-btn active" onclick="switchView('dashboard', this)">Panel</button>
        <button class="nav-btn" onclick="switchView('stock', this)">Stock</button>
        <button class="nav-btn" onclick="switchView('combos', this)">Combos</button>
        <button class="nav-btn" onclick="switchView('finanzas', this)">Finanzas</button>
    </nav>
</header>

<main id="app-main" style="display:none">
    
    <div class="view active" id="view-dashboard">
        <div class="stats-grid">
            <div class="stat-box">
                <div class="small-label">Ganancia Hoy</div>
                <div class="price" id="stat-ganancia-hoy" style="color:var(--green)">$0</div>
            </div>
            <div class="stat-box">
                <div class="small-label">Ganancia Total</div>
                <div class="price" id="stat-ganancia-total" style="color:var(--accent)">$0</div>
            </div>
        </div>
        <div class="stat-box" style="margin-bottom:15px; border-left-color: var(--green);" onclick="api.ajustarCaja()">
            <div class="small-label">Dinero en Caja (Efectivo/Total) ✎</div>
            <div class="price" id="stat-caja-actual" style="color:var(--green)">$0</div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:25px">
            <button class="btn" onclick="openModal('modal-venta')">⚡ VENTA</button>
            <button class="btn sec" onclick="openModal('modal-gasto')">💸 GASTO</button>
        </div>

        <h3 style="font-family:var(--font-display); color:var(--accent); margin-bottom:10px">Alertas Críticas</h3>
        <div id="dashboard-alertas"></div>
    </div>
    <button onclick="localStorage.clear(); location.reload();" class="btn danger">ACTUALIZAR PAGINA</button>

    <div class="view" id="view-stock">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
            <h2 style="font-family:var(--font-display)">INVENTARIO</h2>
            <button class="btn" style="width:auto; padding:8px 15px" onclick="api.resetItemForm(); openModal('modal-item');">+ NUEVO</button>
        </div>
        <div class="grid" id="stock-grid"></div>
    </div>

    <div class="view" id="view-combos">
        <h2 style="font-family:var(--font-display); margin-bottom:20px">COMBOS</h2>
        <button class="btn" style="margin-bottom:20px" onclick="openModal('modal-combo')">+ CREAR NUEVO COMBO</button>
        <div class="grid" id="combos-grid"></div>
    </div>

    <div class="view" id="view-finanzas">
        <h2 style="font-family:var(--font-display); margin-bottom:15px">RESUMEN FINANCIERO</h2>
        
        <div class="stats-grid">
            <div class="stat-box" style="grid-column: span 2; border-left-color: var(--red);">
                <div class="small-label">Inversión en Stock (Costo Total)</div>
                <div class="price" id="fin-inversion-total">$0</div>
            </div>
            <div class="stat-box">
                <div class="small-label">Ganancia Semanal</div>
                <div class="price" id="fin-ganancia-semana" style="color:var(--green); font-size:16px">$0</div>
            </div>
            <div class="stat-box">
                <div class="small-label">Ganancia Mensual</div>
                <div class="price" id="fin-ganancia-mes" style="color:var(--green); font-size:16px">$0</div>
            </div>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin: 20px 0 10px 0">
            <h3 style="font-family:var(--font-display); color:var(--accent)">Historial de Movimientos</h3>
            <button class="btn sec" style="width:auto; padding:5px 10px" onclick="exportarCSV()">Exportar</button>
        </div>
        <div id="finanzas-historial"></div>
    </div>
</main>

<div class="modal-overlay" id="modal-item">
    <div class="modal"><button class="close-modal" onclick="closeAllModals()">×</button>
        <h3 id="item-modal-title">Producto</h3>
        <input type="hidden" id="in-item-id">
        <label>Nombre</label><input type="text" id="in-item-nombre">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
            <div><label>Costo</label><input type="number" id="in-item-costo"></div>
            <div><label>Venta</label><input type="number" id="in-item-venta"></div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
            <div><label>Stock</label><input type="number" id="in-item-qty"></div>
            <div><label>Mínimo</label><input type="number" id="in-item-min"></div>
        </div>
        <button class="btn" style="margin-top:20px" onclick="api.guardarItem()">GUARDAR PRODUCTO</button>
    </div>
</div>

<div class="modal-overlay" id="modal-venta">
    <div class="modal"><button class="close-modal" onclick="closeAllModals()">×</button>
        <h3>Registrar Venta</h3>
        <label>Tipo</label><select id="in-v-tipo" onchange="actualizarSelectoresVenta()"><option value="p">Producto Único</option><option value="c">Combo</option></select>
        <label>Seleccionar</label><select id="in-v-id"></select>
        <label>Fecha (Opcional)</label><input type="date" id="in-v-fecha">
        <label>Notas / Cliente</label><input type="text" id="in-v-nota">
        <button class="btn" style="margin-top:20px" onclick="api.confirmarVenta()">CONFIRMAR VENTA</button>
    </div>
</div>

<div class="modal-overlay" id="modal-gasto">
    <div class="modal"><button class="close-modal" onclick="closeAllModals()">×</button>
        <h3 style="color:var(--red)">Nuevo Gasto</h3>
        <label>Concepto</label><input type="text" id="in-g-nombre">
        <label>Monto</label><input type="number" id="in-g-monto">
        <button class="btn danger" style="margin-top:20px" onclick="api.guardarGasto()">REGISTRAR GASTO</button>
    </div>
</div>

<div class="modal-overlay" id="modal-combo">
    <div class="modal"><button class="close-modal" onclick="closeAllModals()">×</button>
        <h3>Nuevo Combo</h3>
        <label>Nombre del Combo</label><input type="text" id="in-c-nombre">
        <label>Items (Ctrl+Click)</label><select id="in-c-items" multiple style="height:100px"></select>
        <label>Precio Combo</label><input type="number" id="in-c-venta">
        <button class="btn" style="margin-top:20px" onclick="api.guardarCombo()">CREAR COMBO</button>
    </div>
</div>

<div id="toast"></div>

<script>
const DEFAULT_ID = "d951e27d09ed468c59d4";
const LS_ID = 'mp_cloud_id';
let DB = { items: [], combos: [], ventas: [], gastos: [], ajusteCaja: 0 };

const api = {
    async sync() {
        const id = localStorage.getItem(LS_ID);
        if(!id) return;
        try {
            await fetch(`https://api.npoint.io/${id}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(DB)
            });
            renderAll();
        } catch(e) { msg("Error de Sincro ❌"); }
    },

    async load() {
        const id = localStorage.getItem(LS_ID);
        try {
            const res = await fetch(`https://api.npoint.io/${id}?nocache=${Date.now()}`);
            if(!res.ok) throw new Error();
            DB = await res.json();
            if(!DB.ventas) DB.ventas = [];
            if(!DB.gastos) DB.gastos = [];
            if(DB.ajusteCaja === undefined) DB.ajusteCaja = 0;
            renderAll();
        } catch(e) { 
            msg("Error de red"); 
        }
    },

    guardarItem() {
        const id = val('in-item-id');
        const data = { nombre: val('in-item-nombre'), costo: num('in-item-costo'), venta: num('in-item-venta'), qty: num('in-item-qty'), min: num('in-item-min') };
        if(!data.nombre) return;
        if(id) {
            const i = DB.items.findIndex(x => x.id === id);
            DB.items[i] = { ...DB.items[i], ...data };
        } else {
            DB.items.push({ id: Date.now().toString(), ...data });
        }
        closeAllModals(); this.sync();
    },

    modificarStock(id, cantidad) {
        const item = DB.items.find(i => i.id === id);
        if(item) { item.qty = Math.max(0, item.qty + cantidad); this.sync(); }
    },

    confirmarVenta() {
        const tipo = val('in-v-tipo'), targetId = val('in-v-id');
        let venta = { id: Date.now(), fecha: val('in-v-fecha') ? new Date(val('in-v-fecha')).toISOString() : new Date().toISOString(), nota: val('in-v-nota') };
        
        if(tipo === 'p') {
            const it = DB.items.find(i => i.id === targetId);
            if(!it || it.qty < 1) return alert("Sin stock");
            it.qty--; venta.nombre = it.nombre; venta.total = it.venta; venta.costo = it.costo; venta.refs = [it.id];
        } else {
            const co = DB.combos.find(c => c.id === targetId);
            let cCosto = 0; let cRefs = [];
            co.items.forEach(itemId => {
                const it = DB.items.find(i => i.id === itemId);
                if(it) { it.qty--; cCosto += it.costo; cRefs.push(it.id); }
            });
            venta.nombre = "Combo: " + co.nombre; venta.total = co.venta; venta.costo = cCosto; venta.refs = cRefs;
        }
        DB.ventas.push(venta);
        closeAllModals(); this.sync();
    },

    guardarGasto() {
        DB.gastos.push({ id: Date.now(), fecha: new Date().toISOString(), nombre: val('in-g-nombre'), monto: num('in-g-monto') });
        closeAllModals(); this.sync();
    },

    borrarMovimiento(id, tipo) {
        if(!confirm("¿Eliminar? Se restaurará stock.")) return;
        if(tipo === 'v') {
            const v = DB.ventas.find(x => x.id === id);
            if(v && v.refs) v.refs.forEach(r => { const it = DB.items.find(i=>i.id===r); if(it) it.qty++; });
            DB.ventas = DB.ventas.filter(x => x.id !== id);
        } else {
            DB.gastos = DB.gastos.filter(x => x.id !== id);
        }
        this.sync();
    },

    ajustarCaja() {
        const actual = numTxt('stat-caja-actual');
        const nuevo = prompt("Dinero físico real en caja:", actual);
        if(nuevo !== null) {
            const vTot = DB.ventas.reduce((a,b)=>a+b.total,0);
            const gTot = DB.gastos.reduce((a,b)=>a+b.monto,0);
            DB.ajusteCaja = parseFloat(nuevo) - (vTot - gTot);
            this.sync();
        }
    },

    guardarCombo() {
        const sel = document.getElementById('in-c-items');
        DB.combos.push({ id: 'c'+Date.now(), nombre: val('in-c-nombre'), items: [...sel.selectedOptions].map(o => o.value), venta: num('in-c-venta') });
        closeAllModals(); this.sync();
    },

    resetItemForm() { setVal('in-item-id',''); setVal('in-item-nombre',''); setVal('in-item-costo',''); setVal('in-item-venta',''); setVal('in-item-qty',''); setVal('in-item-min','2'); setTxt('item-modal-title','Nuevo Producto'); },
    editarItem(id) {
        const it = DB.items.find(i => i.id === id);
        setVal('in-item-id', it.id); setVal('in-item-nombre', it.nombre); setVal('in-item-costo', it.costo); setVal('in-item-venta', it.venta); setVal('in-item-qty', it.qty); setVal('in-item-min', it.min);
        setTxt('item-modal-title','Editar Producto'); openModal('modal-item');
    }
};

function renderDashboard() {
    const hoy = new Date().toDateString();
    const vHoy = DB.ventas.filter(v => new Date(v.fecha).toDateString() === hoy);
    const gHoy = DB.gastos.filter(g => new Date(g.fecha).toDateString() === hoy);
    const ganHoy = vHoy.reduce((a,b)=>a+(b.total-b.costo),0) - gHoy.reduce((a,b)=>a+b.monto,0);
    setTxt('stat-ganancia-hoy', fmt(ganHoy));
    const ganTotal = DB.ventas.reduce((a,b)=>a+(b.total-b.costo),0) - DB.gastos.reduce((a,b)=>a+b.monto,0);
    setTxt('stat-ganancia-total', fmt(ganTotal));
    const caja = DB.ventas.reduce((a,b)=>a+b.total,0) - DB.gastos.reduce((a,b)=>a+b.monto,0) + (DB.ajusteCaja || 0);
    setTxt('stat-caja-actual', caja < 0 ? "$0" : fmt(caja));
    const alertas = DB.items.filter(i => i.qty <= i.min);
    setHtml('dashboard-alertas', alertas.map(i => `<div class="card" style="margin-bottom:8px; padding:10px; flex-direction:row; justify-content:space-between"><span>${i.nombre}</span><b style="color:var(--red)">${i.qty} unid.</b></div>`).join('') || '<p style="opacity:0.5; text-align:center">Todo en orden ✅</p>');
}

function renderStock() {
    setHtml('stock-grid', DB.items.map(i => {
        // CORRECCIÓN IMÁGENES: Convierte a minúsculas y reemplaza espacios por guiones bajos
        const imgName = i.nombre.toLowerCase().trim().replace(/\s+/g,'_');
        return `
        <div class="card">
            <img src="img/${imgName}.jpg" class="prod-img" onerror="this.src='https://via.placeholder.com/150/1c1915/d9c5a3?text=S/F'">
            <div style="font-weight:bold; height:35px; overflow:hidden; font-size:12px">${i.nombre}</div>
            <div class="price">${fmt(i.venta)}</div>
            <div class="qty-controls">
                <button class="btn-qty" onclick="api.modificarStock('${i.id}',-1)">-</button>
                <b>${i.qty}</b>
                <button class="btn-qty" onclick="api.modificarStock('${i.id}',1)">+</button>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:10px">
                <button class="btn sec" style="padding:5px" onclick="api.editarItem('${i.id}')">Editar</button>
                <button class="btn danger" style="padding:5px" onclick="if(confirm('¿Borrar?')){DB.items=DB.items.filter(x=>x.id!=='${i.id}');api.sync();}">X</button>
            </div>
        </div>
    `}).join(''));
}

function renderFinanzas() {
    setTxt('fin-inversion-total', fmt(DB.items.reduce((a,b)=>a+(b.costo*b.qty),0)));
    const ahora = new Date();
    const vSem = DB.ventas.filter(v => (ahora - new Date(v.fecha)) < 7*24*60*60*1000);
    const gSem = DB.gastos.filter(g => (ahora - new Date(g.fecha)) < 7*24*60*60*1000);
    setTxt('fin-ganancia-semana', fmt(vSem.reduce((a,b)=>a+(b.total-b.costo),0) - gSem.reduce((a,b)=>a+b.monto,0)));
    const vMes = DB.ventas.filter(v => (ahora - new Date(v.fecha)) < 30*24*60*60*1000);
    const gMes = DB.gastos.filter(g => (ahora - new Date(g.fecha)) < 30*24*60*60*1000);
    setTxt('fin-ganancia-mes', fmt(vMes.reduce((a,b)=>a+(b.total-b.costo),0) - gMes.reduce((a,b)=>a+b.monto,0)));

    const todos = [...DB.ventas.map(v=>({...v, t:'v'})), ...DB.gastos.map(g=>({...g, t:'g', total: g.monto}))].sort((a,b) => new Date(b.fecha) - new Date(a.fecha));
    setHtml('finanzas-historial', todos.map(x => `
        <div class="hist-item" style="border-left: 3px solid ${x.t==='v'?'var(--green)':'var(--red)'}">
            <div style="flex:1">
                <div style="font-weight:bold; font-size:11px">${x.nombre} ${x.nota ? '<small>('+x.nota+')</small>' : ''}</div>
                <div style="font-size:9px; color:var(--text-dim)">${new Date(x.fecha).toLocaleDateString()}</div>
            </div>
            <div style="display:flex; align-items:center; gap:15px">
                <b style="color:${x.t==='v'?'var(--green)':'var(--red)'}">${fmt(x.total)}</b>
                <button onclick="api.borrarMovimiento('${x.id}','${x.t}')" style="background:none; border:none; color:var(--red); cursor:pointer; padding:5px">✕</button>
            </div>
        </div>
    `).join(''));
}

function renderCombos() { setHtml('combos-grid', DB.combos.map(c => `<div class="card"><div style="font-weight:bold">${c.nombre}</div><div class="price">${fmt(c.venta)}</div><button class="btn danger" onclick="if(confirm('¿Borrar?')){DB.combos=DB.combos.filter(x=>x.id!=='${c.id}');api.sync();}">Borrar</button></div>`).join('')); }
function renderAll() { renderDashboard(); renderStock(); renderFinanzas(); renderCombos(); }

const fmt = n => '$' + parseFloat(n||0).toLocaleString('es-AR');
const val = id => document.getElementById(id).value;
const setVal = (id, v) => document.getElementById(id).value = v;
const num = id => parseFloat(val(id)) || 0;
const numTxt = id => parseFloat(document.getElementById(id).textContent.replace(/[^0-9.-]+/g,"")) || 0;
const setTxt = (id, t) => document.getElementById(id).textContent = t;
const setHtml = (id, h) => document.getElementById(id).innerHTML = h;
function msg(m) { const t = document.getElementById('toast'); t.textContent = m; t.style.display='block'; setTimeout(()=>t.style.display='none',2000); }
function closeAllModals() { document.querySelectorAll('.modal-overlay').forEach(m=>m.classList.remove('active')); }
function openModal(id) { 
    document.getElementById(id).classList.add('active'); 
    if(id==='modal-combo') setHtml('in-c-items', DB.items.map(i=>`<option value="${i.id}">${i.nombre}</option>`).join(''));
    if(id==='modal-venta') actualizarSelectoresVenta();
}
function switchView(id, btn) {
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('view-'+id).classList.add('active');
    btn.classList.add('active');
}
function actualizarSelectoresVenta() {
    const t = val('in-v-tipo'), s = document.getElementById('in-v-id');
    s.innerHTML = (t==='p' ? DB.items : DB.combos).map(x=>`<option value="${x.id}">${x.nombre}</option>`).join('');
}
function exportarCSV() {
    let csv = "Fecha,Tipo,Concepto,Monto\n";
    DB.ventas.forEach(v => csv += `${v.fecha},VENTA,${v.nombre},${v.total}\n`);
    DB.gastos.forEach(g => csv += `${g.fecha},GASTO,${g.nombre},${g.monto}\n`);
    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download='finanzas.csv'; a.click();
}

(async function init() {
    if(!localStorage.getItem(LS_ID)) {
        localStorage.setItem(LS_ID, DEFAULT_ID);
    }
    
    document.getElementById('app-header').style.display='flex';
    document.getElementById('app-main').style.display='block';
    await api.load();
})();
</script>
