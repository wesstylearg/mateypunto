<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MATE & PUNTO 🧉 — Gestión v3.0</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #13110f; --surface: #1c1915; --surface2: #26221c; --border: #363028;
  --primary: #0d3d28; --primary-light: #1b5e3d; --accent: #d9c5a3;
  --text: #fdf5e6; --text-dim: #a89a8e; --red: #a33b3b; --green: #42e091;
  --radius: 14px; --font-display: 'DM Serif Display', serif; --font-mono: 'DM Mono', monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-mono);font-size:13px;line-height:1.6;overflow-x:hidden}

header {
    padding: 15px 25px; background: var(--primary); border-bottom: 2px solid var(--accent);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.logo { font-family: var(--font-display); font-size: 24px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }

nav { display: flex; gap: 8px; background: rgba(0,0,0,0.3); padding: 6px; border-radius: 12px; }
.nav-btn {
    background: none; border: none; color: var(--text-dim); padding: 8px 16px;
    border-radius: 8px; cursor: pointer; font-family: var(--font-mono); font-size: 11px;
    transition: 0.3s;
}
.nav-btn.active { background: var(--accent); color: var(--primary); font-weight: bold; }
.nav-btn:hover:not(.active) { color: var(--text); background: var(--surface2); }

main { padding: 25px; max-width: 1100px; margin: 0 auto; min-height: 80vh; }
.view { display: none; animation: fadeIn 0.4s ease forwards; }
.view.active { display: block; }
@keyframes fadeIn { from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)} }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
.card { 
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px; position: relative; transition: 0.3s;
}
.card:hover { border-color: var(--accent); transform: translateY(-3px); }

.prod-img { 
    width: 100%; height: 160px; object-fit: cover; border-radius: 10px; 
    margin-bottom: 15px; background: var(--bg); border: 1px solid var(--border);
}

.price { font-family: var(--font-display); font-size: 20px; color: var(--accent); margin: 5px 0; }

.btn {
    background: var(--primary); color: var(--accent); border: 1px solid var(--accent);
    padding: 10px 20px; border-radius: 10px; cursor: pointer; font-family: var(--font-mono);
    font-size: 12px; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
}
.btn:hover { background: var(--accent); color: var(--primary); }
.btn.sec { background: var(--surface2); border-color: var(--border); color: var(--text-dim); }
.btn.danger { border-color: var(--red); color: var(--red); background: transparent; }
.btn.danger:hover { background: var(--red); color: white; }

.modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
    display: none; align-items: center; justify-content: center; z-index: 2000;
    backdrop-filter: blur(8px); padding: 20px;
}
.modal-overlay.active { display: flex; }
.modal {
    background: var(--surface); border: 2px solid var(--accent); padding: 30px;
    border-radius: 20px; width: 100%; max-width: 480px; position: relative;
    box-shadow: 0 10px 50px rgba(0,0,0,1);
}
.close-modal {
    position: absolute; top: 15px; right: 15px; background: none; border: none;
    color: var(--text-dim); font-size: 20px; cursor: pointer;
}

label { display: block; font-size: 10px; text-transform: uppercase; color: var(--accent); margin-bottom: 5px; margin-top: 10px; }
input, select, textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); padding: 12px; border-radius: 10px; font-family: var(--font-mono);
    outline: none; transition: 0.3s;
}
input:focus { border-color: var(--accent); }

.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
.stat-box { background: var(--surface); padding: 20px; border-radius: var(--radius); border-left: 4px solid var(--accent); }

#toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: var(--primary); padding: 12px 25px;
    border-radius: 50px; font-weight: bold; z-index: 3000; display: none;
    box-shadow: 0 5px 20px rgba(0,0,0,0.4);
}
</style>
</head>
<body>

<div id="setup-screen" style="position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:4000;">
    <div class="modal" style="text-align:center">
        <div class="logo" style="font-size:32px; margin-bottom:10px">Mate & Punto</div>
        <p style="color:var(--text-dim); margin-bottom:25px">Gestión Cloud con nPoint</p>
        <input type="text" id="cloud-id" placeholder="Pega tu nPoint ID aquí...">
        <button class="btn" style="width:100%; margin-top:15px" onclick="iniciarCloud()">Sincronizar Sistema →</button>
        <p style="font-size:10px; color:var(--text-dim); margin-top:15px">Usa el mismo ID en tu PC y Celular para compartir datos.</p>
    </div>
</div>

<header id="app-header" style="display:none">
    <div class="logo">Mate & Punto</div>
    <nav>
        <button class="nav-btn active" onclick="switchView('dashboard', this)">Panel</button>
        <button class="nav-btn" onclick="switchView('stock', this)">Stock</button>
        <button class="nav-btn" onclick="switchView('combos', this)">Combos</button>
        <button class="nav-btn" onclick="switchView('ventas', this)">Ventas</button>
    </nav>
    <div style="display:flex; gap:5px">
        <button class="btn sec" onclick="api.sync()">🔄</button>
        <button class="btn sec" onclick="exportarCSV()">CSV</button>
    </div>
</header>

<main id="app-main" style="display:none">
    <div class="view active" id="view-dashboard">
        <div class="stats-row">
            <div class="stat-box">
                <div style="font-size:10px; color:var(--text-dim)">GANANCIA HOY</div>
                <div class="price" id="stat-ganancia" style="color:var(--green)">$0</div>
            </div>
            <div class="stat-box">
                <div style="font-size:10px; color:var(--text-dim)">STOCK VALORIZADO</div>
                <div class="price" id="stat-stock-val">$0</div>
            </div>
        </div>
        <div style="display:flex; gap:10px; margin-bottom:30px">
            <button class="btn" onclick="openModal('modal-venta')">⚡ AGREGAR VENTA</button>
            <button class="btn sec" onclick="openModal('modal-gasto')">💸 AGREGAR GASTO EXTRA</button>
        </div>
        <h3 style="font-family:var(--font-display); color:var(--accent); margin-bottom:15px">Alertas Críticas</h3>
        <div id="dashboard-alertas"></div>
    </div>

    <div class="view" id="view-stock">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px">
            <h2 style="font-family:var(--font-display)">STOCK ACTUAL</h2>
            <button class="btn" onclick="openModal('modal-item')">+ AGREGAR PRODUCTO</button>
        </div>
        <div class="grid" id="stock-grid"></div>
    </div>

    <div class="view" id="view-combos">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px">
            <h2 style="font-family:var(--font-display)">Gestión de Combos</h2>
            <button class="btn" onclick="openModal('modal-combo')">+ Crear Combo</button>
        </div>
        <div class="grid" id="combos-grid"></div>
    </div>

    <div class="view" id="view-ventas">
        <h2 style="font-family:var(--font-display); margin-bottom:25px">Historial Financiero</h2>
        <div id="historial-lista"></div>
    </div>
</main>

<div class="modal-overlay" id="modal-item">
    <div class="modal">
        <button class="close-modal" onclick="closeAllModals()">×</button>
        <h3 style="font-family:var(--font-display); color:var(--accent)">Nuevo Producto</h3>
        <label>Nombre del producto</label>
        <input type="text" id="in-item-nombre" placeholder="Ej: Mate Imperial">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
            <div><label>Costo</label><input type="number" id="in-item-costo"></div>
            <div><label>Venta</label><input type="number" id="in-item-venta"></div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
            <div><label>Cantidad</label><input type="number" id="in-item-qty"></div>
            <div><label>Stock Mínimo</label><input type="number" id="in-item-min" value="2"></div>
        </div>
        <button class="btn" style="width:100%; margin-top:20px" onclick="api.guardarItem()">Guardar en Stock</button>
    </div>
</div>

<div class="modal-overlay" id="modal-venta">
    <div class="modal">
        <button class="close-modal" onclick="closeAllModals()">×</button>
        <h3 style="font-family:var(--font-display); color:var(--accent)">Registrar Venta</h3>
        <label>Tipo</label>
        <select id="in-v-tipo" onchange="actualizarSelectoresVenta()"><option value="p">Producto</option><option value="c">Combo</option></select>
        <label>Seleccionar Ítem</label>
        <select id="in-v-id"></select>
        <label>Notas adicionales</label>
        <textarea id="in-v-nota" rows="2"></textarea>
        <button class="btn" style="width:100%; margin-top:20px" onclick="api.confirmarVenta()">Cobrar Ahora</button>
    </div>
</div>

<div class="modal-overlay" id="modal-gasto">
    <div class="modal">
        <button class="close-modal" onclick="closeAllModals()">×</button>
        <h3 style="color:var(--red)">Gasto Extra</h3>
        <label>Concepto</label><input type="text" id="in-g-nombre">
        <label>Monto</label><input type="number" id="in-g-monto">
        <button class="btn danger" style="width:100%; margin-top:20px" onclick="api.guardarGasto()">Registrar Gasto</button>
    </div>
</div>

<div class="modal-overlay" id="modal-combo">
    <div class="modal">
        <button class="close-modal" onclick="closeAllModals()">×</button>
        <h3>Crear Combo</h3>
        <label>Nombre</label><input type="text" id="in-c-nombre">
        <label>Productos (Manten Ctrl)</label>
        <select id="in-c-items" multiple style="height:100px"></select>
        <label>Precio Combo</label><input type="number" id="in-c-venta">
        <button class="btn" style="width:100%; margin-top:20px" onclick="api.guardarCombo()">Guardar Combo</button>
    </div>
</div>

<div id="toast"></div>

<script>
// =============================================
// MOTOR DE DATOS NPOINT (Sincronizado)
// =============================================
let DB = { items: [], combos: [], ventas: [], gastos: [] };
const LS_ID = 'mp_cloud_id';

const api = {
    async sync() {
        const id = localStorage.getItem(LS_ID);
        if(!id) return;
        msg("Sincronizando ☁️...");
        try {
            await fetch(`https://api.npoint.io/${id}`, {
                method: 'POST', // nPoint usa POST para actualizar el bin completo
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(DB)
            });
            renderAll();
            msg("Sincronizado ✅");
        } catch(e) { msg("Error de conexión ❌"); }
    },

    async load() {
        const id = localStorage.getItem(LS_ID);
        if(!id) return;
        try {
            const res = await fetch(`https://api.npoint.io/${id}`);
            DB = await res.json();
            renderAll();
        } catch(e) { msg("Error al cargar datos"); }
    },

    guardarItem() {
        const item = {
            id: Date.now().toString(),
            nombre: val('in-item-nombre'),
            costo: num('in-item-costo'),
            venta: num('in-item-venta'),
            qty: num('in-item-qty'),
            min: num('in-item-min')
        };
        if(!item.nombre) return alert("Nombre requerido");
        DB.items.push(item);
        closeAllModals();
        this.sync();
    },

    borrarItem(id) {
        if(!confirm("¿Eliminar producto?")) return;
        DB.items = DB.items.filter(i => i.id !== id);
        this.sync();
    },

    guardarCombo() {
        const sel = document.getElementById('in-c-items');
        const ids = [...sel.selectedOptions].map(o => o.value);
        DB.combos.push({
            id: 'c'+Date.now(),
            nombre: val('in-c-nombre'),
            items: ids,
            venta: num('in-c-venta')
        });
        closeAllModals();
        this.sync();
    },

    confirmarVenta() {
        const tipo = val('in-v-tipo');
        const targetId = val('in-v-id');
        let venta = { id: Date.now(), fecha: new Date().toISOString(), nota: val('in-v-nota') };

        if(tipo === 'p') {
            const it = DB.items.find(i => i.id === targetId);
            if(!it || it.qty < 1) return alert("Sin stock");
            it.qty--;
            venta.nombre = it.nombre; venta.total = it.venta; venta.costo = it.costo;
        } else {
            const co = DB.combos.find(c => c.id === targetId);
            let cTotal = 0;
            co.items.forEach(id => {
                const it = DB.items.find(i => i.id === id);
                if(it) { it.qty--; cTotal += it.costo; }
            });
            venta.nombre = "Combo: "+co.nombre; venta.total = co.venta; venta.costo = cTotal;
        }
        DB.ventas.push(venta);
        closeAllModals();
        this.sync();
    },

    guardarGasto() {
        DB.gastos.push({ id: Date.now(), fecha: new Date().toISOString(), nombre: val('in-g-nombre'), monto: num('in-g-monto') });
        closeAllModals();
        this.sync();
    },

    borrarRegistro(id, tipo) {
        if(!confirm("¿Borrar registro financiero?")) return;
        if(tipo === 'v') DB.ventas = DB.ventas.filter(v => v.id !== id);
        else DB.gastos = DB.gastos.filter(g => g.id !== id);
        this.sync();
    }
};

// =============================================
// NAVEGACIÓN Y RENDER (MANTENIDO)
// =============================================
function renderAll() {
    renderDashboard();
    renderStock();
    renderCombos();
    renderFinanzas();
}

function renderDashboard() {
    const hoy = new Date().toDateString();
    const vHoy = DB.ventas.filter(v => new Date(v.fecha).toDateString() === hoy);
    const gHoy = DB.gastos.filter(g => new Date(g.fecha).toDateString() === hoy);
    const ganancia = vHoy.reduce((a,b) => a + (b.total - b.costo), 0) - gHoy.reduce((a,b) => a + b.monto, 0);
    const stockVal = DB.items.reduce((a,b) => a + (b.costo * b.qty), 0);
    setTxt('stat-ganancia', fmt(ganancia));
    setTxt('stat-stock-val', fmt(stockVal));
    const alertas = DB.items.filter(i => i.qty <= i.min);
    setHtml('dashboard-alertas', alertas.map(i => `
        <div class="card" style="margin-bottom:10px; padding:12px; display:flex; justify-content:space-between">
            <span>${i.nombre}</span>
            <span style="color:var(--red)">Quedan ${i.qty}</span>
        </div>
    `).join('') || '<p>JOYA PA ✅</p>');
}

function renderStock() {
    document.getElementById('stock-grid').innerHTML = DB.items.map(i => `
        <div class="card">
            <img src="https://via.placeholder.com/200/1c1915/d9c5a3?text=${i.nombre[0]}" class="prod-img">
            <div style="font-weight:bold">${i.nombre}</div>
            <div class="price">${fmt(i.venta)}</div>
            <div style="font-size:10px; color:var(--text-dim)">Stock: ${i.qty}</div>
            <div style="margin-top:15px; display:flex; gap:5px">
                <button class="btn danger" onclick="api.borrarItem('${i.id}')">🗑</button>
            </div>
        </div>
    `).join('');
}

function renderCombos() {
    setHtml('combos-grid', DB.combos.map(c => `
        <div class="card">
            <div style="font-weight:bold">${c.nombre}</div>
            <div class="price">${fmt(c.venta)}</div>
            <button class="btn danger" style="width:100%; margin-top:10px" onclick="api.borrarCombo('${c.id}')">Eliminar</button>
        </div>
    `).join(''));
}

function renderFinanzas() {
    const all = [
        ...DB.ventas.map(v => ({...v, tipo: 'v'})),
        ...DB.gastos.map(g => ({...g, tipo: 'g', total: g.monto}))
    ].sort((a,b) => new Date(b.fecha) - new Date(a.fecha));

    setHtml('historial-lista', all.map(x => `
        <div class="card" style="margin-bottom:10px; border-left: 5px solid ${x.tipo==='v'?'var(--green)':'var(--red)'}">
            <div style="display:flex; justify-content:space-between">
                <div>
                    <div style="font-weight:bold">${x.nombre}</div>
                    <div style="font-size:10px; color:var(--text-dim)">${new Date(x.fecha).toLocaleString()}</div>
                </div>
                <div style="font-weight:bold; color:${x.tipo==='v'?'var(--green)':'var(--red)'}">${fmt(x.total)}</div>
            </div>
        </div>
    `).join(''));
}

function switchView(id, btn) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('view-'+id).classList.add('active');
    btn.classList.add('active');
}

function openModal(id) { 
    document.getElementById(id).classList.add('active');
    if(id === 'modal-venta') actualizarSelectoresVenta();
    if(id === 'modal-combo') {
        document.getElementById('in-c-items').innerHTML = DB.items.map(i => `<option value="${i.id}">${i.nombre}</option>`).join('');
    }
}

function closeAllModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active')); }

function actualizarSelectoresVenta() {
    const tipo = val('in-v-tipo');
    const s = document.getElementById('in-v-id');
    s.innerHTML = (tipo === 'p' ? DB.items : DB.combos).map(x => `<option value="${x.id}">${x.nombre}</option>`).join('');
}

const fmt = n => '$' + parseFloat(n||0).toLocaleString('es-AR');
const val = id => document.getElementById(id).value;
const num = id => parseFloat(val(id)) || 0;
const setTxt = (id, txt) => document.getElementById(id).textContent = txt;
const setHtml = (id, html) => document.getElementById(id).innerHTML = html;

function msg(m) {
    const t = document.getElementById('toast');
    t.textContent = m; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2500);
}

// INICIO CLOUD
async function iniciarCloud() {
    const id = val('cloud-id').trim();
    if(!id) return alert("Pega tu ID");
    localStorage.setItem(LS_ID, id);
    await api.load();
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('app-header').style.display = 'flex';
    document.getElementById('app-main').style.display = 'block';
}

function exportarCSV() {
    let csv = "Tipo,Nombre,Total,Fecha\n";
    DB.ventas.forEach(v => csv += `VENTA,${v.nombre},${v.total},${v.fecha}\n`);
    DB.gastos.forEach(g => csv += `GASTO,${g.nombre},${g.monto},${g.fecha}\n`);
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
    a.download = 'mate_punto_finanzas.csv'; a.click();
}

// INIT
(async function init() {
    const id = localStorage.getItem(LS_ID);
    if(id) {
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('app-header').style.display = 'flex';
        document.getElementById('app-main').style.display = 'block';
        await api.load();
    }
})();

// Refresco al volver a la pestaña
window.addEventListener('focus', () => api.load());
</script>
</body>
</html>
