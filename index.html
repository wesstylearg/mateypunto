<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MATE & PUNTO 🧉 — Cloud Sync</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #13110f; --surface: #1c1915; --border: #363028;
  --primary: #0d3d28; --accent: #d9c5a3;
  --text: #fdf5e6; --text-dim: #a89a8e; --red: #a33b3b; --green: #42e091;
  --radius: 14px; --font-display: 'DM Serif Display', serif; --font-mono: 'DM Mono', monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-mono);font-size:13px;line-height:1.6}
header { padding: 15px 25px; background: var(--primary); border-bottom: 2px solid var(--accent); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; }
.logo { font-family: var(--font-display); font-size: 24px; color: var(--accent); text-transform: uppercase; }
nav { display: flex; gap: 8px; background: rgba(0,0,0,0.3); padding: 6px; border-radius: 12px; }
.nav-btn { background: none; border: none; color: var(--text-dim); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: var(--font-mono); font-size: 11px; }
.nav-btn.active { background: var(--accent); color: var(--primary); font-weight: bold; }
main { padding: 25px; max-width: 1100px; margin: 0 auto; }
.view { display: none; }
.view.active { display: block; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; transition: 0.3s; }
.prod-img { width: 100%; height: 160px; object-fit: cover; border-radius: 10px; margin-bottom: 15px; background: #000; }
.price { font-family: var(--font-display); font-size: 20px; color: var(--accent); }
.btn { background: var(--primary); color: var(--accent); border: 1px solid var(--accent); padding: 10px 20px; border-radius: 10px; cursor: pointer; font-family: var(--font-mono); font-size: 12px; }
.btn.sec { background: #26221c; border-color: #363028; color: #a89a8e; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(8px); padding: 20px; }
.modal-overlay.active { display: flex; }
.modal { background: var(--surface); border: 2px solid var(--accent); padding: 30px; border-radius: 20px; width: 100%; max-width: 480px; position: relative; }
input, select, textarea { width: 100%; background: #13110f; border: 1px solid #363028; color: #fdf5e6; padding: 12px; border-radius: 10px; margin-bottom: 15px; }
#toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--accent); color: var(--primary); padding: 12px 25px; border-radius: 50px; display: none; z-index: 3000; font-weight: bold; }
#loading-overlay { position: fixed; inset: 0; background: var(--bg); display: none; align-items: center; justify-content: center; z-index: 5000; flex-direction: column; gap: 15px; }
</style>
</head>
<body>

<div id="loading-overlay">
    <div style="border: 4px solid var(--accent); border-top: 4px solid transparent; width: 40px; height: 40px; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    <p>Sincronizando nube...</p>
</div>

<div id="setup-screen" style="position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:4000;">
    <div class="modal" style="text-align:center">
        <div class="logo" style="margin-bottom:10px">Mate & Punto</div>
        <p style="color:var(--text-dim); margin-bottom:25px">Ingresa tu Token para conectar tus dispositivos</p>
        <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxx">
        <button class="btn" style="width:100%" onclick="conectarSistema()">Sincronizar Celular/PC →</button>
    </div>
</div>

<header id="app-header" style="display:none">
    <div class="logo">Mate & Punto</div>
    <nav>
        <button class="nav-btn active" onclick="switchView('dashboard', this)">Panel</button>
        <button class="nav-btn" onclick="switchView('stock', this)">Stock</button>
        <button class="nav-btn" onclick="switchView('finanzas', this)">Ventas</button>
    </nav>
</header>

<main id="app-main" style="display:none">
    <div class="view active" id="view-dashboard">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px;">
            <div class="card" style="border-left: 4px solid var(--green)">
                <div style="font-size: 10px; color: var(--text-dim)">GANANCIA HOY</div>
                <div class="price" id="dash-ganancia">$0</div>
            </div>
            <div class="card" style="border-left: 4px solid var(--accent)">
                <div style="font-size: 10px; color: var(--text-dim)">PRODUCTOS TOTALES</div>
                <div class="price" id="dash-items">0</div>
            </div>
        </div>
        <button class="btn" onclick="openModal('modal-venta')" style="width: 100%; padding: 20px; font-size: 16px;">+ REGISTRAR VENTA</button>
    </div>

    <div class="view" id="view-stock">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px">
            <h2>Inventario</h2>
            <button class="btn" onclick="openModal('modal-item')">+ Nuevo</button>
        </div>
        <div class="grid" id="stock-grid"></div>
    </div>

    <div class="view" id="view-finanzas">
        <h2>Historial</h2>
        <div id="finanzas-list" style="margin-top:20px"></div>
    </div>
</main>

<div class="modal-overlay" id="modal-item">
    <div class="modal">
        <h3>Nuevo Producto</h3>
        <input type="text" id="in-nombre" placeholder="Nombre (Ej: Mate Camionero)">
        <input type="number" id="in-costo" placeholder="Costo $">
        <input type="number" id="in-venta" placeholder="Venta $">
        <input type="number" id="in-qty" placeholder="Stock Inicial">
        <div style="display:flex; gap:10px">
            <button class="btn sec" style="flex:1" onclick="closeAllModals()">Cancelar</button>
            <button class="btn" style="flex:1" onclick="api.addItem()">Guardar</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modal-venta">
    <div class="modal">
        <h3>Venta Rápida</h3>
        <label style="font-size: 10px; color: var(--accent)">PRODUCTO</label>
        <select id="in-v-id"></select>
        <button class="btn" style="width:100%; margin-top:10px" onclick="api.sell()">Confirmar Venta</button>
        <button class="btn sec" style="width:100%; margin-top:10px" onclick="closeAllModals()">Cerrar</button>
    </div>
</div>

<div id="toast"></div>

<script>
let DB = { items: [], ventas: [] };
const LS_TOKEN = 'mp_token_v4', LS_GIST = 'mp_gist_v4';

const api = {
    async sync() {
        const t = localStorage.getItem(LS_TOKEN), g = localStorage.getItem(LS_GIST);
        if(!t || !g) return;
        document.getElementById('loading-overlay').style.display = 'flex';
        try {
            await fetch(`https://api.github.com/gists/${g}`, {
                method: 'PATCH',
                headers: { Authorization: `token ${t}` },
                body: JSON.stringify({ files: { 'mate.json': { content: JSON.stringify(DB) } } })
            });
            render();
            showToast("Guardado en la Nube ☁️");
        } catch(e) { showToast("Error de conexión ❌"); }
        document.getElementById('loading-overlay').style.display = 'none';
    },

    addItem() {
        const item = {
            id: Date.now().toString(),
            nombre: document.getElementById('in-nombre').value,
            costo: parseFloat(document.getElementById('in-costo').value) || 0,
            venta: parseFloat(document.getElementById('in-venta').value) || 0,
            qty: parseInt(document.getElementById('in-qty').value) || 0
        };
        if(!item.nombre) return;
        DB.items.push(item);
        closeAllModals();
        this.sync();
    },

    sell() {
        const id = document.getElementById('in-v-id').value;
        const it = DB.items.find(i => i.id === id);
        if(it && it.qty > 0) {
            it.qty--;
            DB.ventas.push({ id: Date.now(), nombre: it.nombre, total: it.venta, costo: it.costo, fecha: new Date().toISOString() });
            closeAllModals();
            this.sync();
        } else { alert("Sin stock"); }
    },

    deleteItem(id) {
        if(confirm("¿Eliminar producto?")) { DB.items = DB.items.filter(i => i.id !== id); this.sync(); }
    }
};

function render() {
    // Stats
    const hoy = new Date().toDateString();
    const vHoy = DB.ventas.filter(v => new Date(v.fecha).toDateString() === hoy);
    const ganancia = vHoy.reduce((a,b) => a + (b.total - b.costo), 0);
    document.getElementById('dash-ganancia').textContent = '$' + ganancia.toLocaleString();
    document.getElementById('dash-items').textContent = DB.items.length;

    // Stock
    document.getElementById('stock-grid').innerHTML = DB.items.map(i => `
        <div class="card">
            <img src="img/${i.nombre.toLowerCase().replace(/ /g,'-')}.jpg" class="prod-img" onerror="this.src='https://via.placeholder.com/200/1c1915/d9c5a3?text=${i.nombre[0]}'">
            <div style="font-weight:bold">${i.nombre}</div>
            <div class="price">$${i.venta}</div>
            <div style="font-size:10px; color:var(--text-dim)">Stock: ${i.qty}</div>
            <button class="btn sec" style="width:100%; margin-top:10px" onclick="api.deleteItem('${i.id}')">Eliminar</button>
        </div>
    `).join('');

    // Historial
    document.getElementById('finanzas-list').innerHTML = [...DB.ventas].reverse().map(v => `
        <div class="card" style="margin-bottom:10px; display:flex; justify-content:space-between">
            <div><b>${v.nombre}</b><br><small>${new Date(v.fecha).toLocaleTimeString()}</small></div>
            <div style="color:var(--green)">+$${v.total}</div>
        </div>
    `).join('');
}

async function conectarSistema() {
    const token = document.getElementById('gh-token').value.trim();
    if(!token) return;
    document.getElementById('loading-overlay').style.display = 'flex';
    try {
        // Buscar si ya existe un gist de Mate & Punto
        const gists = await fetch('https://api.github.com/gists', { headers: { Authorization: `token ${token}` } }).then(r => r.json());
        const existing = gists.find(g => g.description === "MATE_PUNTO_DB");
        
        let gistId;
        if(existing) {
            gistId = existing.id;
        } else {
            const res = await fetch('https://api.github.com/gists', {
                method: 'POST',
                headers: { Authorization: `token ${token}` },
                body: JSON.stringify({ description: "MATE_PUNTO_DB", public: false, files: { "mate.json": { content: JSON.stringify(DB) } } })
            });
            const data = await res.json();
            gistId = data.id;
        }
        
        localStorage.setItem(LS_TOKEN, token);
        localStorage.setItem(LS_GIST, gistId);
        location.reload();
    } catch(e) { alert("Error de conexión o token"); }
}

function switchView(id, btn) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('view-'+id).classList.add('active');
    btn.classList.add('active');
}

function openModal(id) { 
    document.getElementById(id).classList.add('active');
    if(id === 'modal-venta') {
        document.getElementById('in-v-id').innerHTML = DB.items.map(i => `<option value="${i.id}">${i.nombre} (${i.qty})</option>`).join('');
    }
}
function closeAllModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active')); }
function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2500); }

(async function init() {
    const t = localStorage.getItem(LS_TOKEN), g = localStorage.getItem(LS_GIST);
    if(t && g) {
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('app-header').style.display = 'flex';
        document.getElementById('app-main').style.display = 'block';
        try {
            const res = await fetch(`https://api.github.com/gists/${g}`, { headers: { Authorization: `token ${t}` } });
            const data = await res.json();
            DB = JSON.parse(data.files["mate.json"].content);
            render();
        } catch(e) { console.error("Error cargando nube"); }
    }
})();
</script>
</body>
</html>
