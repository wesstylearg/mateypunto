<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MATE Y PUNTO 🧉 — Gestión de Stock</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0b0b0b;

  --surface: #1a1208;
  --surface2: #24180b;
  --surface3: #2e1d0d;

  --border: #3a2812;
  --border2: #5a3a18;

  --primary: #3b2205;
  --primary-light: #5a3a18;

  --accent: #e8e0d0;
  --green: #0b3d1f;

  --danger: #a94444;

  --text: #f3eadc;
  --text2: #c5b9a5;
  --text3: #8a7a63;

  --radius: 12px;

  --font-display: 'DM Serif Display', serif;
  --font-mono: 'DM Mono', monospace;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  background: radial-gradient(circle at top, #1a1208, #0b0b0b 70%);
  color:var(--text);
  font-family:var(--font-mono);
  font-size:13px;
}

/* HEADER */
header{
  padding:16px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background: linear-gradient(to right, #1a1208, #24180b);
  border-bottom:2px solid var(--primary-light);
}

.logo-wrap{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo-img{
  width:28px;
  height:28px;
}

.logo-text{
  font-family:var(--font-display);
  font-size:18px;
  color:var(--accent);
  letter-spacing:1px;
}

/* NAV */
nav{
  display:flex;
  gap:5px;
}

.nav-btn{
  background:none;
  border:none;
  color:var(--text2);
  padding:6px 14px;
  cursor:pointer;
}

.nav-btn.active{
  color:var(--accent);
}

/* CARDS */
.stat-card,
.producto-card,
.historial-card{
  background: linear-gradient(145deg, #1a1208, #24180b);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
  transition:0.2s;
}

.stat-card:hover,
.producto-card:hover{
  transform:translateY(-3px);
  border-color:var(--accent);
}

/* BOTONES */
.btn{
  background:var(--primary);
  border:1px solid var(--primary-light);
  color:var(--accent);
  padding:8px 14px;
  cursor:pointer;
}

.btn:hover{
  background:var(--primary-light);
  border-color:var(--accent);
}

/* STOCK */
.stock-ok{color:#7bdc9c}
.stock-low{color:#e0b04a}
.stock-out{color:#ff7a7a}

/* TITULOS */
.page-title{
  font-family:var(--font-display);
  font-size:26px;
  margin-bottom:10px;
}

/* GRID */
.productos-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:12px;
}

/* MISC */
main{
  padding:20px;
  max-width:1000px;
  margin:auto;
}

.view{display:none}
.view.active{display:block}

</style>
</head>

<body>

<header>
  <div class="logo-wrap">
    <img src="logo.png" class="logo-img">
    <div class="logo-text">MATE & PUNTO</div>
  </div>

  <nav>
    <button class="nav-btn active" onclick="showView('dashboard')">Inicio</button>
    <button class="nav-btn" onclick="showView('stock')">Stock</button>
    <button class="nav-btn" onclick="showView('ventas')">Ventas</button>
  </nav>
</header>

<main>

<div class="view active" id="view-dashboard">
  <div class="page-title">Panel</div>

  <div class="productos-grid">
    <div class="stat-card">
      <div>Stock Total</div>
      <div id="stat-unidades">0</div>
    </div>

    <div class="stat-card">
      <div>Ventas Hoy</div>
      <div id="stat-ventas-hoy">$0</div>
    </div>
  </div>
</div>

<div class="view" id="view-stock">
  <div class="page-title">Inventario</div>
  <div class="productos-grid" id="stock-grid"></div>
</div>

<div class="view" id="view-ventas">
  <div class="page-title">Ventas</div>
  <div id="historial-ventas"></div>
</div>

</main>

<script>
function showView(v){
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');

  document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));
  event.currentTarget.classList.add('active');
}
</script>

</body>
</html>
