<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MATE & PUNTO 🧉 — Gestión Premium</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1a1612; --surface: #24201b; --surface2: #2e2923; --border: #3d352c;
  --primary: #0d3d28; --primary-light: #1b5e3d; --accent: #d9c5a3;
  --text: #fdf5e6; --text-dim: #a89a8e; --red: #8b3a3a; --green: #42e091;
  --radius: 12px; --font-display: 'DM Serif Display', serif; --font-mono: 'DM Mono', monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-mono);font-size:13px;line-height:1.6}
header{padding:15px 20px;background:var(--primary);border-bottom:3px solid var(--accent);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo-text{font-family:var(--font-display);font-size:22px;color:var(--accent);text-transform:uppercase}
nav{display:flex;gap:5px;background:rgba(0,0,0,0.2);padding:5px;border-radius:10px}
.nav-btn{background:none;border:none;color:var(--accent);padding:8px 12px;border-radius:8px;cursor:pointer;font-size:11px}
.nav-btn.active{background:var(--accent);color:var(--primary);font-weight:bold}
main{padding:20px;max-width:1000px;margin:0 auto}
.view{display:none}.view.active{display:block}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;margin-bottom:25px}
.stat-card{background:var(--surface);border:1px solid var(--border);padding:15px;border-radius:var(--radius);border-left:4px solid var(--accent)}
.stat-label{color:var(--text-dim);font-size:10px;text-transform:uppercase;margin-bottom:5px}
.stat-value{font-family:var(--font-display);font-size:24px;color:var(--accent)}
.btn{background:var(--primary);border:1px solid var(--accent);color:var(--accent);padding:8px 16px;border-radius:8px;cursor:pointer;font-family:var(--font-mono);font-size:11px}
.btn.secondary{background:var(--surface2);border-color:var(--border);color:var(--text-dim)}
.btn.danger{border-color:var(--red);color:var(--red);background:transparent}
.producto-img{width:100%;height:150px;object-fit:cover;border-radius:8px;margin-bottom:10px;background:var(--bg)}
.productos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:15px}
.card{background:var(--surface);border:1px solid var(--border);padding:15px;border-radius:var(--radius);position:relative}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--accent);padding:25px;border-radius:15px;width:90%;max-width:450px;max-height:90vh;overflow-y:auto}
input,select,textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:8px;margin-top:5px;margin-bottom:12px;font-family:var(--font-mono)}
.badge{padding:2px 6px;border-radius:4px;font-size:9px;font-weight:bold}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:var(--primary);padding:10px 20px;border-radius:30px;display:none;z-index:2000}
</style>
</head>
<body>

<header>
    <div class="logo-text">Mate & Punto</div>
    <div style="display:flex;gap:10px">
        <nav>
            <button class="nav-btn active" onclick="showView('dashboard')">Panel</button>
            <button class="nav-btn" onclick="showView('stock')">Stock</button>
            <button class="nav-btn" onclick="showView('combos')">Combos</button>
            <button class="nav-btn" onclick="showView('ventas')">Finanzas</button>
        </nav>
        <button class="btn secondary" onclick="exportCSV()">📥 Backup</button>
    </div>
</header>

<main>
    <div class="view active" id="view-dashboard">
        <div class="cards-grid">
            <div class="stat-card"><div class="stat-label">Ventas Mes</div><div class="stat-value" id="stat-ventas-mes">$0</div></div>
            <div class="stat-card"><div class="stat-label">Ganancia Real</div><div class="stat-value" id="stat-ganancia-mes" style="color:var(--green)">$0</div></div>
            <div class="stat-card"><div class="stat-label">Gastos Extra</div><div class="stat-value" id="stat-gastos-mes" style="color:var(--red)">$0</div></div>
        </div>
        <div style="display:flex;gap:15px;margin-bottom:20px">
            <button class="btn" onclick="openModalVenta()">+ Nueva Venta</button>
            <button class="btn secondary" onclick="openModalGasto()">+ Gasto Extra</button>
        </div>
        <h3 style="color:var(--accent);margin-bottom:10px;font-family:var(--font-display)">Alertas de Stock</h3>
        <div id="alertas-stock"></div>
    </div>

    <div class="view" id="view-stock">
        <div style="display:flex;justify-content:space-between;margin-bottom:20px">
            <h2 style="font-family:var(--font-display)">Inventario</h2>
            <button class="btn" onclick="openModalItem()">+ Nuevo Producto</button>
        </div>
        <div class="productos-grid" id="stock-grid"></div>
    </div>

    <div class="view" id="view-combos">
        <div style="display:flex;justify-content:space-between;margin-bottom:20px">
            <h2 style="font-family:var(--font-display)">Combos</h2>
            <button class="btn" onclick="openModalCombo()">+ Crear Combo</button>
        </div>
        <div class="productos-grid" id="combos-grid"></div>
    </div>

    <div class="view" id="view-ventas">
        <h2 style="font-family:var(--font-display);margin-bottom:20px">Historial Financiero</h2>
        <div id="historial-mezclado"></div>
    </div>
</main>

<div class="modal-overlay" id="modal-item">
    <div class="modal">
        <h3 style="color:var(--accent);margin-bottom:15px">Producto</h3>
        <label>Nombre del Producto</label>
        <input type="text" id="item-nombre" placeholder="Ej: Mate Imperial">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div><label>Costo</label><input type="number" id="item-costo"></div>
            <div><label>Venta</label><input type="number" id="item-venta"></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div><label>Stock</label><input type="number" id="item-qty"></div>
            <div><label>Alerta Mín.</label><input type="number" id="item-min" value="2"></div>
        </div>
        <p style="font-size:10px;color:var(--text-dim)">Foto: se buscará como img/[nombre].jpg</p>
        <div style="display:flex;gap:10px;margin-top:15px">
            <button class="btn secondary" style="flex:1" onclick="closeModal('modal-item')">Cerrar</button>
            <button class="btn" style="flex:1" onclick="guardarItem()">Guardar</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modal-combo">
    <div class="modal">
        <h3 style="color:var(--accent);margin-bottom:15px">Nuevo Combo</h3>
        <label>Nombre del Combo</label>
        <input type="text" id="combo-nombre">
        <label>Productos que incluye (mantener Ctrl para varios)</label>
        <select id="combo-items-select" multiple style="height:100px"></select>
        <label>Precio de Venta del Combo</label>
        <input type="number" id="combo-venta">
        <div style="display:flex;gap:10px">
            <button class="btn secondary" style="flex:1" onclick="closeModal('modal-combo')">Cerrar</button>
            <button class="btn" style="flex:1" onclick="guardarCombo()">Guardar</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modal-venta">
    <div class="modal">
        <h3 style="color:var(--accent);margin-bottom:15px">Registrar Venta</h3>
        <label>Tipo de Venta</label>
        <select id="venta-tipo" onchange="actualizarSelectorVenta()">
            <option value="producto">Producto Individual</option>
            <option value="combo">Combo</option>
        </select>
        <label>Seleccionar</label>
        <select id="venta-target-id"></select>
        <label>Descripción / Cliente</label>
        <textarea id="venta-desc" rows="2" placeholder="Ej: Juan de Instagram"></textarea>
        <div style="display:flex;gap:10px">
            <button class="btn secondary" style="flex:1" onclick="closeModal('modal-venta')">Cerrar</button>
            <button class="btn" style="flex:1" onclick="confirmarVenta()">Cobrar</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modal-gasto">
    <div class="modal">
        <h3 style="color:var(--accent);margin-bottom:15px">Gasto Extra</h3>
        <label>Concepto</label>
        <input type="text" id="gasto-nombre" placeholder="Ej: Publicidad Facebook">
        <label>Monto ($)</label>
        <input type="number" id="gasto-monto">
        <div style="display:flex;gap:10px">
            <button class="btn secondary" style="flex:1" onclick="closeModal('modal-gasto')">Cerrar</button>
            <button class="btn danger" style="flex:1;background:var(--red);color:white" onclick="guardarGasto()">Registrar Gasto</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
// BASE DE DATOS
let DB = { items: [], combos: [], ventas: [], gastos: [] };
const LS_TOKEN = 'mp_token', LS_GIST = 'mp_gist';

const fmt = n => '$' + parseFloat(n||0).toLocaleString('es-AR');

async function sync() {
    const t = localStorage.getItem(LS_TOKEN), g = localStorage.getItem(LS_GIST);
    if (!t || !g) return;
    await fetch(`https://api.github.com/gists/${g}`, {
        method: 'PATCH',
        headers: { Authorization: `token ${t}` },
        body: JSON.stringify({ files: { 'mate.json': { content: JSON.stringify(DB) } } })
    });
    renderAll();
}

// LOGICA PRODUCTOS
function guardarItem() {
    const id = Date.now().toString();
    const item = {
        id,
        nombre: document.getElementById('item-nombre').value,
        costo: parseFloat(document.getElementById('item-costo').value) || 0,
        venta: parseFloat(document.getElementById('item-venta').value) || 0,
        cantidad: parseInt(document.getElementById('item-qty').value) || 0,
        min: parseInt(document.getElementById('item-min').value) || 2
    };
    DB.items.push(item);
    closeModal('modal-item');
    sync();
}

function eliminarItem(id) {
    if(!confirm("¿Eliminar producto? No afectará ventas pasadas.")) return;
    DB.items = DB.items.filter(i => i.id !== id);
    sync();
}

// LOGICA COMBOS
function guardarCombo() {
    const select = document.getElementById('combo-items-select');
    const ids = Array.from(select.selectedOptions).map(opt => opt.value);
    const combo = {
        id: 'c' + Date.now(),
        nombre: document.getElementById('combo-nombre').value,
        itemIds: ids,
        venta: parseFloat(document.getElementById('combo-venta').value) || 0
    };
    DB.combos.push(combo);
    closeModal('modal-combo');
    sync();
}

// LOGICA VENTAS Y GASTOS
function confirmarVenta() {
    const tipo = document.getElementById('venta-tipo').value;
    const targetId = document.getElementById('venta-target-id').value;
    const desc = document.getElementById('venta-desc').value;

    let totalVenta = 0, costoVenta = 0, nombreVenta = "";

    if (tipo === 'producto') {
        const it = DB.items.find(i => i.id === targetId);
        if (it.cantidad < 1) return alert("Sin stock");
        it.cantidad--;
        totalVenta = it.venta;
        costoVenta = it.costo;
        nombreVenta = it.nombre;
    } else {
        const co = DB.combos.find(c => c.id === targetId);
        co.itemIds.forEach(id => {
            const it = DB.items.find(i => i.id === id);
            if (it) { it.cantidad--; costoVenta += it.costo; }
        });
        totalVenta = co.venta;
        nombreVenta = "COMBO: " + co.nombre;
    }

    DB.ventas.push({
        id: Date.now(),
        fecha: new Date().toISOString(),
        nombre: nombreVenta,
        total: totalVenta,
        costo: costoVenta,
        desc: desc
    });

    closeModal('modal-venta');
    sync();
}

function guardarGasto() {
    DB.gastos.push({
        id: Date.now(),
        fecha: new Date().toISOString(),
        nombre: document.getElementById('gasto-nombre').value,
        monto: parseFloat(document.getElementById('gasto-monto').value) || 0
    });
    closeModal('modal-gasto');
    sync();
}

function eliminarFinanza(id, tipo) {
    if(!confirm("¿Eliminar este registro?")) return;
    if(tipo === 'venta') DB.ventas = DB.ventas.filter(v => v.id !== id);
    else DB.gastos = DB.gastos.filter(g => g.id !== id);
    sync();
}

// RENDERERS
function renderAll() {
    renderDashboard();
    renderStock();
    renderCombos();
    renderFinanzas();
}

function renderDashboard() {
    const hoy = new Date().getMonth();
    const ventasMes = DB.ventas.filter(v => new Date(v.fecha).getMonth() === hoy);
    const gastosMes = DB.gastos.filter(g => new Date(g.fecha).getMonth() === hoy);

    const ingresos = ventasMes.reduce((a,b) => a + b.total, 0);
    const costosProd = ventasMes.reduce((a,b) => a + b.costo, 0);
    const extras = gastosMes.reduce((a,b) => a + b.monto, 0);

    document.getElementById('stat-ventas-mes').textContent = fmt(ingresos);
    document.getElementById('stat-ganancia-mes').textContent = fmt(ingresos - costosProd - extras);
    document.getElementById('stat-gastos-mes').textContent = fmt(extras);

    const alertas = DB.items.filter(i => i.cantidad <= i.min);
    document.getElementById('alertas-stock').innerHTML = alertas.map(i => `
        <div class="card" style="margin-bottom:5px;padding:10px;display:flex;justify-content:space-between">
            <span>${i.nombre}</span>
            <span style="color:var(--red)">Stock: ${i.cantidad}</span>
        </div>
    `).join('');
}

function renderStock() {
    const grid = document.getElementById('stock-grid');
    grid.innerHTML = DB.items.map(i => `
        <div class="card">
            <img src="img/${i.nombre.toLowerCase().replace(/ /g, '-')}.jpg" class="producto-img" onerror="this.src='https://via.placeholder.com/150/1a1612/d9c5a3?text=Sin+Foto'">
            <div style="font-weight:bold;color:var(--accent)">${i.nombre}</div>
            <div style="font-size:16px;margin:5px 0">${fmt(i.venta)}</div>
            <div style="font-size:10px;color:var(--text-dim)">Stock: ${i.cantidad}</div>
            <button class="btn danger" style="width:100%;margin-top:10px" onclick="eliminarItem('${i.id}')">Eliminar</button>
        </div>
    `).join('');
}

function renderCombos() {
    const grid = document.getElementById('combos-grid');
    grid.innerHTML = DB.combos.map(c => `
        <div class="card">
            <div style="font-weight:bold;color:var(--accent)">${c.nombre}</div>
            <div style="font-size:14px;margin:5px 0">${fmt(c.venta)}</div>
            <div style="font-size:9px;color:var(--text-dim)">Incluye: ${c.itemIds.length} productos</div>
        </div>
    `).join('');
}

function renderFinanzas() {
    const lista = document.getElementById('historial-mezclado');
    const todo = [
        ...DB.ventas.map(v => ({...v, tipo: 'venta'})),
        ...DB.gastos.map(g => ({...g, tipo: 'gasto', total: g.monto}))
    ].sort((a,b) => new Date(b.fecha) - new Date(a.fecha));

    lista.innerHTML = todo.map(x => `
        <div class="card" style="margin-bottom:10px; border-left: 4px solid ${x.tipo === 'venta' ? 'var(--green)' : 'var(--red)'}">
            <div style="display:flex; justify-content:space-between">
                <div>
                    <span class="badge" style="background:${x.tipo === 'venta' ? 'var(--primary)' : '#4a1a1a'}">${x.tipo.toUpperCase()}</span>
                    <div style="font-weight:bold;margin-top:5px">${x.nombre}</div>
                    <div style="font-size:10px;color:var(--text-dim)">${x.desc || ''}</div>
                </div>
                <div style="text-align:right">
                    <div style="font-weight:bold; color:${x.tipo === 'venta' ? 'var(--green)' : 'var(--red)'}">
                        ${x.tipo === 'venta' ? '+' : '-'}${fmt(x.total)}
                    </div>
                    <button onclick="eliminarFinanza(${x.id}, '${x.tipo}')" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:10px">🗑 Borrar</button>
                </div>
            </div>
        </div>
    `).join('');
}

// UI HELPERS
function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('view-' + id).classList.add('active');
    event.target.classList.add('active');
}

function openModalItem() { document.getElementById('modal-item').classList.add('open'); }
function openModalGasto() { document.getElementById('modal-gasto').classList.add('open'); }
function openModalVenta() { 
    actualizarSelectorVenta();
    document.getElementById('modal-venta').classList.add('open'); 
}
function openModalCombo() {
    const s = document.getElementById('combo-items-select');
    s.innerHTML = DB.items.map(i => `<option value="${i.id}">${i.nombre}</option>`).join('');
    document.getElementById('modal-combo').classList.add('open');
}

function actualizarSelectorVenta() {
    const tipo = document.getElementById('venta-tipo').value;
    const s = document.getElementById('venta-target-id');
    if(tipo === 'producto') {
        s.innerHTML = DB.items.map(i => `<option value="${i.id}">${i.nombre} (${i.cantidad})</option>`).join('');
    } else {
        s.innerHTML = DB.combos.map(c => `<option value="${c.id}">${c.nombre}</option>`).join('');
    }
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function exportCSV() {
    const data = JSON.stringify(DB);
    const blob = new Blob([data], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `backup_mateypunto_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
}

function abrirConfig() {
    const t = prompt("GitHub Token:", localStorage.getItem(LS_TOKEN));
    const g = prompt("Gist ID:", localStorage.getItem(LS_GIST));
    if(t && g) {
        localStorage.setItem(LS_TOKEN, t);
        localStorage.setItem(LS_GIST, g);
        location.reload();
    }
}

// INIT
(async function init() {
    const t = localStorage.getItem(LS_TOKEN), g = localStorage.getItem(LS_GIST);
    if (t && g) {
        try {
            const res = await fetch(`https://api.github.com/gists/${g}`, { headers: { Authorization: `token ${t}` } });
            const json = await res.json();
            DB = JSON.parse(json.files['mate.json'].content);
            renderAll();
        } catch(e) { abrirConfig(); }
    } else { abrirConfig(); }
})();
</script>
</body>
</html>
