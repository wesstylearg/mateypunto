<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MATE & PUNTO 🧉 — Gestión Móvil</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #13110f; --surface: #1c1915; --surface2: #26221c; --border: #363028;
  --primary: #0d3d28; --primary-light: #1b5e3d; --accent: #d9c5a3;
  --text: #fdf5e6; --text-dim: #a89a8e; --red: #a33b3b; --green: #42e091;
  --radius: 14px; --font-display: 'DM Serif Display', serif; --font-mono: 'DM Mono', monospace;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0; -webkit-tap-highlight-color: transparent;}
body{background:var(--bg);color:var(--text);font-family:var(--font-mono);font-size:14px;line-height:1.6;overflow-x:hidden}

header {
    padding: 12px 15px; background: var(--primary); border-bottom: 2px solid var(--accent);
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.logo { font-family: var(--font-display); font-size: 22px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }

nav { display: flex; width: 100%; gap: 4px; background: rgba(0,0,0,0.3); padding: 4px; border-radius: 10px; overflow-x: auto; scrollbar-width: none; }
nav::-webkit-scrollbar { display: none; }

.nav-btn {
    flex: 1; min-width: 70px; background: none; border: none; color: var(--text-dim); padding: 10px 5px;
    border-radius: 8px; cursor: pointer; font-family: var(--font-mono); font-size: 11px;
    transition: 0.3s; white-space: nowrap;
}
.nav-btn.active { background: var(--accent); color: var(--primary); font-weight: bold; }

main { padding: 15px; max-width: 1100px; margin: 0 auto; min-height: 80vh; padding-bottom: 40px; }
.view { display: none; animation: fadeIn 0.4s ease forwards; }
.view.active { display: block; }
@keyframes fadeIn { from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)} }

/* Grid Adaptable para Móvil */
.grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
    gap: 12px; 
}

/* En celulares muy pequeños, 1 sola columna */
@media (max-width: 380px) {
    .grid { grid-template-columns: 1fr; }
}

.card { 
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 15px; position: relative; transition: 0.3s; display: flex; flex-direction: column;
}

.prod-img { 
    width: 100%; height: 140px; object-fit: cover; border-radius: 10px; 
    margin-bottom: 12px; background: var(--bg); border: 1px solid var(--border);
}

.price { font-family: var(--font-display); font-size: 18px; color: var(--accent); margin: 5px 0; }

.btn {
    background: var(--primary); color: var(--accent); border: 1px solid var(--accent);
    padding: 12px; border-radius: 10px; cursor: pointer; font-family: var(--font-mono);
    font-size: 12px; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%;
}
.btn:active { transform: scale(0.98); background: var(--accent); color: var(--primary); }

.btn.sec { background: var(--surface2); border-color: var(--border); color: var(--text-dim); }
.btn.danger { border-color: var(--red); color: var(--red); background: transparent; }

/* Controles de Stock para Dedos */
.qty-controls {
    display: flex; align-items: center; justify-content: space-between; gap: 5px;
    background: var(--bg); padding: 8px; border-radius: 10px; margin-top: 10px;
}
.btn-qty {
    background: var(--surface2); border: 1px solid var(--border); color: var(--accent);
    width: 40px; height: 40px; border-radius: 8px; cursor: pointer; font-size: 18px;
}

.modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
    display: none; align-items: flex-start; justify-content: center; z-index: 2000;
    backdrop-filter: blur(8px); padding: 15px; padding-top: 50px; overflow-y: auto;
}
.modal-overlay.active { display: flex; }
.modal {
    background: var(--surface); border: 2px solid var(--accent); padding: 20px;
    border-radius: 20px; width: 100%; max-width: 450px; position: relative;
}

label { display: block; font-size: 10px; text-transform: uppercase; color: var(--accent); margin-top: 12px; margin-bottom: 4px; }
input, select, textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); padding: 14px; border-radius: 10px; font-family: var(--font-mono);
    font-size: 16px; /* Evita zoom automático en iPhone */
}

.stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.stat-box { background: var(--surface); padding: 15px; border-radius: var(--radius); border-left: 3px solid var(--accent); }
.stat-box div:first-child { font-size: 9px; }

#toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: var(--primary); padding: 12px 20px;
    border-radius: 50px; font-weight: bold; z-index: 3000; display: none; width: 80%; text-align: center;
}
</style>
</head>
<body>

<div id="setup-screen" style="position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:4000;padding:20px;">
    <div class="modal" style="text-align:center">
        <div class="logo" style="font-size:28px; margin-bottom:10px">Mate & Punto</div>
        <p style="color:var(--text-dim); margin-bottom:20px">ID de Sincronización</p>
        <input type="text" id="cloud-id" placeholder="Pega tu ID aquí...">
        <button class="btn" style="margin-top:15px" onclick="iniciarCloud()">ENTRAR AL PANEL</button>
    </div>
</div>

<header id="app-header" style="display:none">
    <div class="logo">Mate & Punto</div>
    <nav>
        <button class="nav-btn active" onclick="switchView('dashboard', this)">Panel</button>
        <button class="nav-btn" onclick="switchView('stock', this)">Stock</button>
        <button class="nav-btn" onclick="switchView('combos', this)">Combos</button>
        <button class="nav-btn" onclick="switchView('ventas', this)">Ventas</button>
    </nav>
</header>

<main id="app-main" style="display:none">
    <div class="view active" id="view-dashboard">
        <div class="stats-row">
            <div class="stat-box">
                <div>GANANCIA HOY</div>
                <div class="price" id="stat-ganancia" style="color:var(--green); font-size:16px">$0</div>
            </div>
            <div class="stat-box">
                <div>VALOR STOCK</div>
                <div class="price" id="stat-stock-val" style="font-size:16px">$0</div>
            </div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:25px">
            <button class="btn" onclick="openModal('modal-venta')">⚡ VENTA</button>
            <button class="btn sec" onclick="openModal('modal-gasto')">💸 GASTO</button>
        </div>
        
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
             <h3 style="font-family:var(--font-display); color:var(--accent);">Alertas</h3>
             <button class="btn sec" style="width:auto; padding:5px 10px" onclick="api.sync()">🔄 Nube</button>
        </div>
        <div id="dashboard-alertas"></div>
    </div>

    <div class="view" id="view-stock">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
            <h2 style="font-family:var(--font-display)">STOCK</h2>
            <button class="btn" style="width:auto" onclick="openModal('modal-item')">+ NUEVO</button>
        </div>
        <div class="grid" id="stock-grid"></div>
    </div>

    <div class="view" id="view-combos">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
            <h2 style="font-family:var(--font-display)">COMBOS</h2>
            <button class="btn" style="width:auto" onclick="openModal('modal-combo')">+ CREAR</button>
        </div>
        <div class="grid" id="combos-grid"></div>
    </div>

    <div class="view" id="view-ventas">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
            <h2 style="font-family:var(--font-display)">FINANZAS</h2>
            <button class="btn sec" style="width:auto" onclick="exportarCSV()">CSV</button>
        </div>
        <div id="historial-lista"></div>
    </div>
</main>

<div class="modal-overlay" id="modal-item">
    <div class="modal">
        <button class="close-modal" onclick="closeAllModals()">×</button>
        <h3 style="color:var(--accent)">Nuevo Producto</h3>
        <label>Nombre</label><input type="text" id="in-item-nombre">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
            <div><label>Costo</label><input type="number" id="in-item-costo"></div>
            <div><label>Venta</label><input type="number" id="in-item-venta"></div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
            <div><label>Stock</label><input type="number" id="in-item-qty"></div>
            <div><label>Mínimo</label><input type="number" id="in-item-min" value="2"></div>
        </div>
        <button class="btn" style="margin-top:20px" onclick="api.guardarItem()">GUARDAR PRODUCTO</button>
    </div>
</div>

<div class="modal-overlay" id="modal-venta">
    <div class="modal">
        <button class="close-modal" onclick="closeAllModals()">×</button>
        <h3 style="color:var(--accent)">Registrar Venta</h3>
        <label>Tipo</label>
        <select id="in-v-tipo" onchange="actualizarSelectoresVenta()"><option value="p">Producto Único</option><option value="c">Combo Armado</option></select>
        <label>Seleccionar ítem</label><select id="in-v-id"></select>
        <label>Notas</label><textarea id="in-v-nota" rows="2"></textarea>
        <button class="btn" style="margin-top:20px" onclick="api.confirmarVenta()">CONFIRMAR VENTA</button>
    </div>
</div>

<div class="modal-overlay" id="modal-gasto">
    <div class="modal">
        <button class="close-modal" onclick="closeAllModals()">×</button>
        <h3 style="color:var(--red)">Registrar Gasto</h3>
        <label>Concepto</label><input type="text" id="in-g-nombre">
        <label>Monto</label><input type="number" id="in-g-monto">
        <button class="btn danger" style="margin-top:20px" onclick="api.guardarGasto()">CARGAR GASTO</button>
    </div>
</div>

<div class="modal-overlay" id="modal-combo">
    <div class="modal">
        <button class="close-modal" onclick="closeAllModals()">×</button>
        <h3>Nuevo Combo</h3>
        <label>Nombre</label><input type="text" id="in-c-nombre">
        <label>Productos (Tocar para elegir)</label>
        <select id="in-c-items" multiple style="height:120px"></select>
        <label>Precio Final</label><input type="number" id="in-c-venta">
        <button class="btn" style="margin-top:20px" onclick="api.guardarCombo()">GUARDAR COMBO</button>
    </div>
</div>

<div id="toast"></div>

<script>
let DB = { items: [], combos: [], ventas: [], gastos: [] };
const LS_ID = 'mp_cloud_id';

const api = {
    async sync() {
        const id = localStorage.getItem(LS_ID);
        if(!id) return;
        msg("Nube ☁️...");
        try {
            const response = await fetch(`https://api.npoint.io/${id}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(DB)
            });
            if(response.ok) { renderAll(); msg("OK ✅"); }
        } catch(e) { msg("Error ❌"); }
    },

    async load() {
    const id = localStorage.getItem(LS_ID);
    if(!id) return;
    try {
        // Agregamos ?nocache=... para que el celular no use info vieja
        const res = await fetch(`https://api.npoint.io/${id}?nocache=${Date.now()}`);
        DB = await res.json();
        renderAll();
    } catch(e) { msg("Error al cargar datos"); }
},
    guardarItem() {
        const item = { id: Date.now().toString(), nombre: val('in-item-nombre'), costo: num('in-item-costo'), venta: num('in-item-venta'), qty: num('in-item-qty'), min: num('in-item-min') };
        if(!item.nombre) return;
        DB.items.push(item);
        closeAllModals();
        this.sync();
    },

    modificarStock(id, cantidad) {
        const item = DB.items.find(i => i.id === id);
        if(item) {
            item.qty = Math.max(0, item.qty + cantidad);
            this.sync();
        }
    },

    confirmarVenta() {
        const tipo = val('in-v-tipo'), targetId = val('in-v-id');
        let venta = { id: Date.now(), fecha: new Date().toISOString(), nota: val('in-v-nota') };

        if(tipo === 'p') {
            const it = DB.items.find(i => i.id === targetId);
            if(!it || it.qty < 1) return alert("Sin stock");
            it.qty--;
            venta.nombre = it.nombre; venta.total = it.venta; venta.costo = it.costo;
        } else {
            const co = DB.combos.find(c => c.id === targetId);
            let cTotal = 0;
            co.items.forEach(id => {
                const it = DB.items.find(i => i.id === id);
                if(it) { it.qty--; cTotal += it.costo; }
            });
            venta.nombre = "Combo: "+co.nombre; venta.total = co.venta; venta.costo = cTotal;
        }
        DB.ventas.push(venta);
        closeAllModals();
        this.sync();
    },

    guardarGasto() {
        DB.gastos.push({ id: Date.now(), fecha: new Date().toISOString(), nombre: val('in-g-nombre'), monto: num('in-g-monto') });
        closeAllModals();
        this.sync();
    },

    guardarCombo() {
        const sel = document.getElementById('in-c-items');
        DB.combos.push({ id: 'c'+Date.now(), nombre: val('in-c-nombre'), items: [...sel.selectedOptions].map(o => o.value), venta: num('in-c-venta') });
        closeAllModals();
        this.sync();
    }
};

function renderDashboard() {
    const hoy = new Date().toDateString();
    const vHoy = DB.ventas.filter(v => new Date(v.fecha).toDateString() === hoy);
    const gHoy = DB.gastos.filter(g => new Date(g.fecha).toDateString() === hoy);
    const ganancia = vHoy.reduce((a,b) => a + (b.total - b.costo), 0) - gHoy.reduce((a,b) => a + b.monto, 0);
    setTxt('stat-ganancia', fmt(ganancia));
    setTxt('stat-stock-val', fmt(DB.items.reduce((a,b) => a + (b.costo * b.qty), 0)));
    const alertas = DB.items.filter(i => i.qty <= i.min);
    setHtml('dashboard-alertas', alertas.map(i => `
        <div class="card" style="margin-bottom:8px; padding:10px; flex-direction:row; justify-content:space-between; align-items:center">
            <span style="font-size:12px">${i.nombre}</span>
            <span style="color:var(--red); font-weight:bold">STOCK: ${i.qty}</span>
        </div>
    `).join('') || '<p style="text-align:center; opacity:0.5; padding:20px">Todo en orden ✅</p>');
}

function renderStock() {
    setHtml('stock-grid', DB.items.map(i => `
        <div class="card">
            <img src="img/${i.nombre}.jpg" class="prod-img" onerror="this.src='https://via.placeholder.com/150/1c1915/d9c5a3?text=FOTO'">
            <div style="font-weight:bold; font-size:13px; height:40px; overflow:hidden">${i.nombre}</div>
            <div class="price">${fmt(i.venta)}</div>
            <div class="qty-controls">
                <button class="btn-qty" onclick="api.modificarStock('${i.id}', -1)">-</button>
                <span style="font-weight:bold">${i.qty}</span>
                <button class="btn-qty" onclick="api.modificarStock('${i.id}', 1)">+</button>
            </div>
            <button class="btn danger" style="margin-top:10px; padding:5px; font-size:10px" onclick="if(confirm('¿Eliminar?')) { DB.items=DB.items.filter(it=>it.id!=='${i.id}'); api.sync(); }">Eliminar</button>
        </div>
    `).join(''));
}

function renderCombos() {
    setHtml('combos-grid', DB.combos.map(c => `<div class="card"><div style="font-weight:bold">${c.nombre}</div><div class="price">${fmt(c.venta)}</div><button class="btn danger" onclick="if(confirm('¿Borrar?')){DB.combos=DB.combos.filter(x=>x.id!=='${c.id}');api.sync();}">Borrar Combo</button></div>`).join(''));
}

function renderFinanzas() {
    const all = [...DB.ventas.map(v=>({...v,t:'v'})), ...DB.gastos.map(g=>({...g,t:'g',total:g.monto}))].sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
    setHtml('historial-lista', all.map(x => `
        <div class="card" style="margin-bottom:8px; padding:10px; border-left:4px solid ${x.t==='v'?'var(--green)':'var(--red)'}">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <div>
                    <div style="font-weight:bold; font-size:12px">${x.nombre}</div>
                    <div style="font-size:9px; color:var(--text-dim)">${new Date(x.fecha).toLocaleTimeString()}</div>
                </div>
                <div style="font-weight:bold; color:${x.t==='v'?'var(--green)':'var(--red)'}">${fmt(x.total)}</div>
            </div>
        </div>
    `).join(''));
}

function renderAll() { renderDashboard(); renderStock(); renderCombos(); renderFinanzas(); }
function switchView(id, btn) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('view-'+id).classList.add('active');
    btn.classList.add('active');
}
function openModal(id) { 
    document.getElementById(id).classList.add('active');
    if(id==='modal-venta') actualizarSelectoresVenta();
    if(id==='modal-combo') document.getElementById('in-c-items').innerHTML = DB.items.map(i => `<option value="${i.id}">${i.nombre}</option>`).join('');
}
function closeAllModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active')); }
function actualizarSelectoresVenta() {
    const t = val('in-v-tipo'), s = document.getElementById('in-v-id');
    s.innerHTML = (t === 'p' ? DB.items : DB.combos).map(x => `<option value="${x.id}">${x.nombre}</option>`).join('');
}
const fmt = n => '$' + parseFloat(n||0).toLocaleString('es-AR');
const val = id => document.getElementById(id).value;
const num = id => parseFloat(val(id)) || 0;
const setTxt = (id, txt) => document.getElementById(id).textContent = txt;
const setHtml = (id, html) => document.getElementById(id).innerHTML = html;
function msg(m) { const t = document.getElementById('toast'); t.textContent = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); }

async function iniciarCloud() {
    const id = val('cloud-id').trim();
    if(!id) return alert("Pega tu ID");
    localStorage.setItem(LS_ID, id);
    await api.load();
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('app-header').style.display = 'flex';
    document.getElementById('app-main').style.display = 'block';
}

function exportarCSV() {
    let csv = "Tipo,Nombre,Total,Fecha\n";
    DB.ventas.forEach(v => csv += `VENTA,${v.nombre},${v.total},${v.fecha}\n`);
    DB.gastos.forEach(g => csv += `GASTO,${g.nombre},${g.monto},${g.fecha}\n`);
    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'})); a.download = 'finanzas.csv'; a.click();
}

(async function init() {
    const id = localStorage.getItem(LS_ID);
    if(id) {
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('app-header').style.display = 'flex';
        document.getElementById('app-main').style.display = 'block';
        await api.load();
    }
})();
</script>
</body>
</html>
