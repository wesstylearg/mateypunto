<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MATE & PUNTO 🧉 — Gestión de Stock</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0d0b; --surface: #181612; --surface2: #201e1a; --surface3: #2a2721;
  --border: #2f2b24; --border2: #3d382e;
  --amber: #008a49; --amber-light: #42e091; --amber-dim: #7a4f18;
  --green: #4a7c5f; --green-light: #5fa376; --red: #8b3a3a; --red-light: #b04f4f;
  --text: #e8e0d0; --text2: #a09080; --text3: #6a5f52;
  --radius: 10px; --font-display: 'DM Serif Display', serif; --font-mono: 'DM Mono', monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-mono);font-size:13px;min-height:100vh;line-height:1.6}
.app{display:flex;flex-direction:column;min-height:100vh}
header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);position:sticky;top:0;z-index:100;gap:12px;flex-wrap:wrap}
.logo{font-family:var(--font-display);font-size:22px;color:var(--amber);letter-spacing:-0.5px}
.sync-status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3);padding:4px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:20px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3)}
.sync-dot.ok{background:var(--green-light)}.sync-dot.syncing{background:#d4a042;animation:pulse 1s infinite}.sync-dot.error{background:var(--red-light)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
nav{display:flex;gap:2px;background:var(--surface2);padding:4px;border-radius:var(--radius)}
.nav-btn{background:none;border:none;color:var(--text2);padding:6px 14px;border-radius:7px;cursor:pointer;font-family:var(--font-mono);font-size:12px;transition:all 0.15s}
.nav-btn.active{background:var(--surface3);color:var(--amber)}
main{flex:1;padding:20px;max-width:960px;margin:0 auto;width:100%}
.view{display:none}.view.active{display:block}
.page-title{font-family:var(--font-display);font-size:28px;color:var(--text);margin-bottom:4px}
.page-sub{color:var(--text3);font-size:12px;margin-bottom:24px}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.stat-label{color:var(--text3);font-size:11px;text-transform:uppercase;margin-bottom:6px}
.stat-value{font-family:var(--font-display);font-size:26px;color:var(--amber)}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.btn{background:var(--amber-dim);border:1px solid var(--amber);color:var(--amber-light);padding:8px 16px;border-radius:7px;cursor:pointer;font-family:var(--font-mono);font-size:12px;transition:all 0.15s}
.btn:hover{background:var(--amber);color:#0e0d0b}
.btn.secondary{background:var(--surface2);border-color:var(--border2);color:var(--text2)}
.btn.danger{background:var(--red);border-color:var(--red-light);color:#ffd0d0}
.btn.sm{padding:5px 10px;font-size:11px}
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;text-align:left;font-size:10px;text-transform:uppercase;color:var(--text3);background:var(--surface2)}
td{padding:10px 14px;border-top:1px solid var(--border);vertical-align:middle}
.category-badge{padding:2px 8px;border-radius:20px;font-size:10px;text-transform:uppercase}
.cat-mate{background:#2a1a08;color:#c8852a;border:1px solid #4a2e10}
.cat-termo{background:#08201a;color:#42b88a;border:1px solid #0e3a2a}
.stock-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px}
.stock-ok{background:#0e2018;color:var(--green-light);border:1px solid #1a4028}
.stock-low{background:#201408;color:#d4a042;border:1px solid #3a2a10}
.stock-out{background:#200808;color:var(--red-light);border:1px solid #3a1010}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:24px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.form-group{margin-bottom:16px}
input,select{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:10px;border-radius:7px;font-family:var(--font-mono);outline:none}
.productos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.producto-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;position:relative}
.historial-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px}
.historial-header{display:flex;justify-content:space-between;align-items:flex-start}
.historial-items-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.historial-item-chip{background:var(--surface2);padding:2px 10px;border-radius:20px;font-size:11px;color:var(--text2);border:1px solid var(--border)}
.btn-borrar-venta{background:#3a2020;border:1px solid #8b3a3a;color:#ff9494;padding:4px 8px;border-radius:5px;cursor:pointer;font-size:11px;margin-top:8px}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--surface3);border:1px solid var(--amber-dim);color:var(--amber-light);padding:12px 24px;border-radius:30px;z-index:9999;transition:0.3s}
#toast.show{transform:translateX(-50%) translateY(0)}
#loading-overlay{position:fixed;inset:0;background:var(--bg);display:none;align-items:center;justify-content:center;z-index:2000;flex-direction:column;gap:15px}
#loading-overlay.show{display:flex}
.spinner{width:30px;height:30px;border:3px solid var(--border2);border-top-color:var(--amber);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="setup-screen" style="position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1500;padding:20px">
  <div class="modal" style="max-width:400px;text-align:center">
    <div class="logo" style="font-size:32px;margin-bottom:10px">Mate y Punto</div>
    <p style="color:var(--text3);margin-bottom:20px">Configura tu token de GitHub para empezar.</p>
    <input type="password" id="setup-token" placeholder="ghp_xxxx" style="margin-bottom:15px">
    <button class="btn" style="width:100%" onclick="conectarGist()">Conectar →</button>
    <div id="setup-error" style="color:var(--red-light);margin-top:10px;display:none"></div>
  </div>
</div>

<div id="loading-overlay"><div class="spinner"></div><div id="loading-text">Cargando...</div></div>

<div class="app" id="main-app" style="display:none">
  <header>
    <div class="logo">🧉 Mate y Punto</div>
    <div class="header-right" style="display:flex;gap:10px;align-items:center">
      <div class="sync-status"><div class="sync-dot ok" id="sync-dot"></div><span id="sync-label">Sincronizado</span></div>
      <nav>
        <button class="nav-btn active" onclick="showView('dashboard')">Inicio</button>
        <button class="nav-btn" onclick="showView('stock')">Stock</button>
        <button class="nav-btn" onclick="showView('ventas')">Ventas</button>
      </nav>
      <button class="btn secondary sm" onclick="abrirConfig()">⚙</button>
    </div>
  </header>

  <main>
    <div class="view active" id="view-dashboard">
      <div class="section-header">
        <div class="page-title">Panel General</div>
        <button class="btn secondary sm" onclick="copiarLinkSincro()">🔗 Link Celular</button>
      </div>
      <div class="cards-grid">
        <div class="stat-card"><div class="stat-label">Unidades Stock</div><div class="stat-value" id="stat-unidades">0</div></div>
        <div class="stat-card"><div class="stat-label">Ventas Hoy</div><div class="stat-value" id="stat-ventas-hoy">$0</div></div>
        <div class="stat-card"><div class="stat-label">Ganancia Hoy</div><div class="stat-value" style="color:var(--green-light)" id="stat-ganancia-hoy">$0</div></div>
      </div>
      <div class="section-title">Alertas de Stock</div>
      <div id="alerta-stock" style="margin-top:10px"></div>
    </div>

    <div class="view" id="view-stock">
      <div class="section-header">
        <div class="page-title">Inventario</div>
        <button class="btn" onclick="openModalItem()">+ Nuevo Producto</button>
      </div>
      <div class="productos-grid" id="stock-grid"></div>
    </div>

    <div class="view" id="view-ventas">
      <div class="section-header">
        <div class="page-title">Historial de Ventas</div>
        <button class="btn" onclick="openModalVenta()">+ Nueva Venta</button>
      </div>
      <div id="historial-ventas"></div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modal-item">
  <div class="modal">
    <div class="page-title" style="font-size:20px" id="modal-item-title">Producto</div><br>
    <div class="form-group"><label>Nombre</label><input type="text" id="item-nombre"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="form-group"><label>Costo</label><input type="number" id="item-costo"></div>
        <div class="form-group"><label>Venta</label><input type="number" id="item-venta"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="form-group"><label>Stock Actual</label><input type="number" id="item-qty"></div>
        <div class="form-group"><label>Mínimo Alerta</label><input type="number" id="item-min" value="3"></div>
    </div>
    <div class="form-group"><label>Categoría</label>
        <select id="item-cat"><option value="mate">Mate</option><option value="termo">Termo</option><option value="otros">Otros</option></select>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:10px">
        <button class="btn secondary" onclick="closeModal('modal-item')">Cancelar</button>
        <button class="btn" onclick="guardarItem()">Guardar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-venta">
    <div class="modal">
      <div class="page-title" style="font-size:20px">Nueva Venta</div><br>
      <label>Seleccionar Productos:</label>
      <div id="venta-selector" style="max-height:180px;overflow-y:auto;border:1px solid var(--border);padding:8px;border-radius:8px;margin-bottom:15px"></div>
      <div id="venta-lista-seleccionada" style="margin-bottom:15px"></div>
      <div class="form-group"><label>Descuento ($)</label><input type="number" id="venta-desc" value="0" oninput="recalcVenta()"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding-top:15px;border-top:1px solid var(--border2)">
          <div class="stat-value" id="venta-total">$0</div>
          <button class="btn" onclick="confirmarVenta()">Finalizar</button>
      </div>
    </div>
</div>

<div class="modal-overlay" id="modal-confirmar">
    <div class="modal" style="max-width:320px;text-align:center">
        <div class="page-title" style="font-size:18px">¿Confirmar Acción?</div><br>
        <p id="confirmar-msg" style="color:var(--text2);margin-bottom:20px"></p>
        <div style="display:flex;gap:10px;justify-content:center">
            <button class="btn secondary" onclick="closeModal('modal-confirmar')">No, volver</button>
            <button class="btn danger" id="confirmar-btn">Sí, confirmar</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
// =============================================
// PERSISTENCIA Y SINCRONIZACIÓN
// =============================================
const LS_TOKEN = 'mp_token', LS_GIST = 'mp_gist';
const fmt = n => '$' + parseFloat(n||0).toLocaleString('es-AR');
const fmtFecha = ts => new Date(ts).toLocaleString('es-AR');

let memDB = { items: [], ventas: [] };
let ventaTemp = {};
let editingId = null;

const getToken = () => localStorage.getItem(LS_TOKEN);
const getGistId = () => localStorage.getItem(LS_GIST);
const setToken = t => localStorage.setItem(LS_TOKEN, t);
const setGistId = id => localStorage.setItem(LS_GIST, id);

// --- GITHUB API ---
async function conectarGist() {
    const t = document.getElementById('setup-token').value.trim();
    if(!t) return;
    showLoading('Creando nube...');
    try {
        const res = await fetch('https://api.github.com/gists', {
            method: 'POST',
            headers: { Authorization: `Bearer ${t}` },
            body: JSON.stringify({ public: false, files: { 'mate.json': { content: JSON.stringify(memDB) } } })
        });
        const data = await res.json();
        if(res.ok) {
            setToken(t); setGistId(data.id);
            location.reload();
        } else throw "Error";
    } catch(e) {
        document.getElementById('setup-error').style.display = 'block';
        document.getElementById('setup-error').textContent = 'Token inválido.';
        hideLoading();
    }
}

async function guardarEnNube() {
    const t = getToken(), g = getGistId();
    if(!t || !g) return;
    setStatus('syncing');
    try {
        await fetch(`https://api.github.com/gists/${g}`, {
            method: 'PATCH',
            headers: { Authorization: `Bearer ${t}` },
            body: JSON.stringify({ files: { 'mate.json': { content: JSON.stringify(memDB) } } })
        });
        setStatus('ok');
    } catch(e) { setStatus('error'); }
}

async function cargarDesdeNube() {
    const t = getToken(), g = getGistId();
    try {
        const res = await fetch(`https://api.github.com/gists/${g}`, { headers: { Authorization: `Bearer ${t}` } });
        const data = await res.json();
        memDB = JSON.parse(data.files['mate.json'].content);
        return true;
    } catch(e) { return false; }
}

// =============================================
// LÓGICA DE NEGOCIO
// =============================================
const DB = {
    get items() { return memDB.items; },
    set items(v) { memDB.items = v; guardarEnNube(); },
    get ventas() { return memDB.ventas; },
    set ventas(v) { memDB.ventas = v; guardarEnNube(); }
};

function guardarItem() {
    const id = editingId || Date.now().toString();
    const item = {
        id,
        nombre: document.getElementById('item-nombre').value,
        precioCosto: parseFloat(document.getElementById('item-costo').value) || 0,
        precioVenta: parseFloat(document.getElementById('item-venta').value) || 0,
        cantidad: parseInt(document.getElementById('item-qty').value) || 0,
        stockMin: parseInt(document.getElementById('item-min').value) || 3,
        categoria: document.getElementById('item-cat').value
    };
    const items = [...DB.items];
    const idx = items.findIndex(i => i.id === id);
    if(idx > -1) items[idx] = item; else items.push(item);
    DB.items = items;
    closeModal('modal-item'); renderStock(); renderDashboard();
    toast('Producto guardado');
}

function confirmarVenta() {
    const ids = Object.keys(ventaTemp);
    if(ids.length === 0) return;
    
    let subtotal = 0;
    const items = [...DB.items];
    const itemsVenta = ids.map(id => {
        const it = items.find(i => i.id === id);
        const cant = ventaTemp[id];
        it.cantidad -= cant;
        subtotal += (it.precioVenta * cant);
        return { id, nombre: it.nombre, qty: cant, precioVenta: it.precioVenta };
    });

    const desc = parseFloat(document.getElementById('venta-desc').value) || 0;
    const ventas = [...DB.ventas];
    ventas.push({
        id: Date.now().toString(),
        ts: Date.now(),
        items: itemsVenta,
        total: subtotal - desc,
        descuento: desc
    });

    DB.items = items;
    DB.ventas = ventas;
    closeModal('modal-venta'); renderDashboard(); renderVentas(); renderStock();
    toast("✅ Venta registrada");
}

// --- BORRAR VENTA CON REVERSIÓN ---
function pedirConfirmacionBorrarVenta(idVenta) {
    const v = DB.ventas.find(x => x.id === idVenta);
    document.getElementById('confirmar-msg').textContent = `¿Anular venta de ${fmt(v.total)}? El stock se devolverá al inventario.`;
    document.getElementById('confirmar-btn').onclick = () => {
        ejecutarBorradoVenta(idVenta);
        closeModal('modal-confirmar');
    };
    openModal('modal-confirmar');
}

function ejecutarBorradoVenta(idVenta) {
    const ventas = [...DB.ventas];
    const vIdx = ventas.findIndex(v => v.id === idVenta);
    if (vIdx === -1) return;

    const venta = ventas[vIdx];
    const items = [...DB.items];
    
    // Devolver stock
    venta.items.forEach(vi => {
        const it = items.find(i => i.id === vi.id);
        if (it) it.cantidad += vi.qty;
    });

    ventas.splice(vIdx, 1);
    DB.items = items;
    DB.ventas = ventas;

    renderVentas(); renderDashboard(); renderStock();
    toast("🗑 Venta eliminada y stock devuelto");
}

// =============================================
// RENDERERS
// =============================================
function renderDashboard() {
    const hoy = new Date().toDateString();
    const vHoy = DB.ventas.filter(v => new Date(v.ts).toDateString() === hoy);
    
    const ingresos = vHoy.reduce((a,b) => a + b.total, 0);
    const costo = vHoy.reduce((acc, v) => {
        return acc + v.items.reduce((acc2, vi) => {
            const it = DB.items.find(i => i.id === vi.id);
            return acc2 + ((it ? it.precioCosto : 0) * vi.qty);
        }, 0);
    }, 0);

    document.getElementById('stat-unidades').textContent = DB.items.reduce((a,b) => a + (b.cantidad||0), 0);
    document.getElementById('stat-ventas-hoy').textContent = fmt(ingresos);
    document.getElementById('stat-ganancia-hoy').textContent = fmt(ingresos - costo);
    
    const alertas = DB.items.filter(i => i.cantidad <= i.stockMin);
    document.getElementById('alerta-stock').innerHTML = alertas.length ? alertas.map(i => `
        <div style="background:var(--surface2);padding:10px;border-radius:8px;margin-bottom:5px;display:flex;justify-content:space-between">
            <span>${i.nombre}</span>
            <span style="color:var(--red-light)">Stock: ${i.cantidad}</span>
        </div>
    `).join('') : '<p style="color:var(--text3)">Stock OK</p>';
}

function renderStock() {
    const grid = document.getElementById('stock-grid');
    grid.innerHTML = DB.items.map(i => `
        <div class="producto-card">
            <div class="category-badge cat-${i.categoria}">${i.categoria}</div>
            <div style="font-weight:bold;margin:10px 0">${i.nombre}</div>
            <div style="font-size:16px;color:var(--amber)">${fmt(i.precioVenta)}</div>
            <div style="margin:10px 0">${stockBadge(i)}</div>
            <button class="btn secondary sm" style="width:100%" onclick="editarItem('${i.id}')">Editar</button>
        </div>
    `).join('');
}

function renderVentas() {
    const hist = document.getElementById('historial-ventas');
    const ventas = [...DB.ventas].reverse();
    hist.innerHTML = ventas.map(v => {
        // Cálculo ganancia real por venta
        const costoVenta = v.items.reduce((acc, vi) => {
            const it = DB.items.find(i => i.id === vi.id);
            return acc + ((it ? it.precioCosto : 0) * vi.qty);
        }, 0);
        const gananciaReal = v.total - costoVenta;

        return `
        <div class="historial-card">
            <div class="historial-header">
                <div>
                    <div style="color:var(--text3);font-size:11px">${fmtFecha(v.ts)}</div>
                    <div class="stat-value" style="font-size:18px">${fmt(v.total)}</div>
                    <div style="color:var(--green-light);font-size:11px">Ganancia: ${fmt(gananciaReal)}</div>
                </div>
                <button class="btn-borrar-venta" onclick="pedirConfirmacionBorrarVenta('${v.id}')">🗑 Borrar</button>
            </div>
            <div class="historial-items-list">
                ${v.items.map(i => `<span class="historial-item-chip">${i.nombre} x${i.qty}</span>`).join('')}
            </div>
        </div>`;
    }).join('');
}

// =============================================
// INTERFAZ Y MODALES
// =============================================
function showView(v) {
    document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
    document.getElementById('view-'+v).classList.add('active');
    event.currentTarget.classList.add('active');
    if(v === 'dashboard') renderDashboard();
    if(v === 'stock') renderStock();
    if(v === 'ventas') renderVentas();
}

function editarItem(id) { 
    editingId = id; 
    const i = DB.items.find(x => x.id === id);
    document.getElementById('item-nombre').value = i.nombre;
    document.getElementById('item-costo').value = i.precioCosto;
    document.getElementById('item-venta').value = i.precioVenta;
    document.getElementById('item-qty').value = i.cantidad;
    document.getElementById('item-min').value = i.stockMin;
    document.getElementById('item-cat').value = i.categoria;
    openModal('modal-item');
}

function openModalItem() { editingId = null; openModal('modal-item'); }

function openModalVenta() {
    ventaTemp = {};
    const sel = document.getElementById('venta-selector');
    sel.innerHTML = DB.items.filter(i => i.cantidad > 0).map(i => `
        <div onclick="addVentaTemp('${i.id}')" style="padding:10px;border-bottom:1px solid var(--border);cursor:pointer; display:flex; justify-content:space-between">
            <span>${i.nombre}</span>
            <span style="color:var(--amber)">${fmt(i.precioVenta)}</span>
        </div>
    `).join('');
    recalcVenta();
    openModal('modal-venta');
}

function addVentaTemp(id) {
    const it = DB.items.find(i => i.id === id);
    if(ventaTemp[id] >= it.cantidad) return toast("No hay más stock");
    ventaTemp[id] = (ventaTemp[id] || 0) + 1;
    recalcVenta();
}

function recalcVenta() {
    let t = 0;
    const lista = document.getElementById('venta-lista-seleccionada');
    lista.innerHTML = Object.keys(ventaTemp).map(id => {
        const i = DB.items.find(x => x.id === id);
        t += (i.precioVenta * ventaTemp[id]);
        return `<div style="font-size:12px; margin-bottom:4px">📦 ${i.nombre} x${ventaTemp[id]}</div>`;
    }).join('');
    const d = parseFloat(document.getElementById('venta-desc').value) || 0;
    document.getElementById('venta-total').textContent = fmt(t - d);
}

function stockBadge(i) {
    if(i.cantidad <= 0) return '<span class="stock-badge stock-out">Agotado</span>';
    if(i.cantidad <= i.stockMin) return `<span class="stock-badge stock-low">${i.cantidad} unid.</span>`;
    return `<span class="stock-badge stock-ok">${i.cantidad} unid.</span>`;
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function toast(m) {
    const t = document.getElementById('toast');
    t.textContent = m; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

function setStatus(s) { document.getElementById('sync-dot').className = 'sync-dot ' + s; }
function showLoading(m) { document.getElementById('loading-text').textContent = m; document.getElementById('loading-overlay').classList.add('show'); }
function hideLoading() { document.getElementById('loading-overlay').classList.remove('show'); }

function copiarLinkSincro() {
    const link = `${window.location.origin}${window.location.pathname}?t=${getToken()}&g=${getGistId()}`;
    navigator.clipboard.writeText(link);
    toast("Link copiado. Envíalo a tu celular.");
}

function abrirConfig() {
    const nt = prompt("Actualizar Token GitHub (ghp_...):", getToken());
    if(nt) { setToken(nt); toast("Token actualizado localmente."); }
}

// =============================================
// INIT
// =============================================
(async function init() {
    const params = new URLSearchParams(window.location.search);
    if(params.get('t')) { 
        setToken(params.get('t')); 
        setGistId(params.get('g')); 
        window.history.replaceState({},'',window.location.pathname); 
    }
    
    if(getToken() && getGistId()) {
        document.getElementById('setup-screen').style.display = 'none';
        showLoading('Sincronizando...');
        const ok = await cargarDesdeNube();
        hideLoading();
        if(ok) {
            document.getElementById('main-app').style.display = 'flex';
            renderDashboard(); renderStock(); renderVentas();
        } else {
            document.getElementById('setup-screen').style.display = 'flex';
        }
    }
})();
</script>
